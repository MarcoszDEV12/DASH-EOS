<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS-BR | MONITORAMENTO NACIONAL</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js + Plugin para Números nos Gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        :root {
            --shopee-orange: #ee4d2d;
            --shopee-dark: #d73211;
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --bg-hover: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-blue: #2f81f7;
            --accent-green: #3fb950;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER HUD --- */
        header {
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 15px 40px;
            z-index: 1000;
        }

        .hud-wrapper {
            max-width: 1800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 200px 1fr 180px;
            gap: 20px;
            align-items: center;
        }

        .logo h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
        .logo span { color: var(--shopee-orange); }

        .filter-bar {
            display: grid;
            grid-template-columns: repeat(4, 160px) 1fr;
            gap: 12px;
        }

        .filter-group select, .search-box input {
            width: 100%;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            transition: var(--transition);
        }

        .filter-group select:hover { border-color: var(--shopee-orange); }
        
        .search-box { position: relative; }
        .search-box input { padding-left: 35px; }
        .search-box i { position: absolute; left: 12px; top: 10px; color: var(--text-dim); font-size: 12px; }

        .sys-info { text-align: right; font-family: var(--font-code); font-size: 13px; color: var(--shopee-orange); font-weight: 700; }

        /* --- DASHBOARD VIEWPORT --- */
        .viewport {
            flex: 1;
            padding: 20px 40px;
            overflow-y: auto;
            background: radial-gradient(circle at 50% 0%, rgba(238, 77, 45, 0.03), transparent);
        }

        .container { max-width: 1800px; margin: 0 auto; }

        /* Grade 2x2 para os Gráficos */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 320px);
            gap: 20px;
            margin-bottom: 25px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: var(--transition);
            position: relative;
        }

        .chart-card:hover { border-color: var(--shopee-orange); }

        .chart-card h3 {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chart-container {
            position: relative;
            height: 230px;
            width: 100%;
        }

        /* --- DATA TABLE --- */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .table-toolbar {
            padding: 15px 25px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .counter {
            color: var(--shopee-orange);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .scroll-area { max-height: 400px; overflow-y: auto; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        
        thead th {
            position: sticky; top: 0;
            background: #0d1117;
            padding: 15px 25px;
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 12px 25px;
            font-size: 13px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.3);
        }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; background: rgba(47, 129, 247, 0.1); color: var(--accent-blue); }
        .time-txt { color: var(--shopee-orange); font-family: var(--font-code); font-weight: 600; }

    </style>
</head>
<body>

    <header>
        <div class="hud-wrapper">
            <div class="logo"><h1>EOS<span>BR</span> MONITOR</h1></div>
            
            <div class="filter-bar">
                <select id="f-mes"><option>MAIO 2026</option></select>
                <select id="f-turno" onchange="App.filter()">
                    <option value="">TURNOS (TODOS)</option>
                    <option>T1</option><option>T2</option><option>T3</option>
                </select>
                <select id="f-cd" onchange="App.filter()">
                    <option value="">CDs (TODOS)</option>
                    <option>Jaboatão</option><option>Franco 1</option><option>Hidrolândia</option><option>Nova Santa Rita</option>
                </select>
                <select id="f-cargo" onchange="App.filter()">
                    <option value="">CARGOS (TODOS)</option>
                    <option>Team Leader</option><option>Supervisor</option><option>Supervisor Turno</option>
                </select>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="f-search" placeholder="Filtrar por nome..." onkeyup="App.filter()">
                </div>
            </div>

            <div class="sys-info" id="clock">00:00:00</div>
        </div>
    </header>

    <main class="viewport">
        <div class="container">
            <!-- Grade 2x2 -->
            <div class="analytics-grid">
                <div class="chart-card">
                    <h3>Volume por Turno <i class="fas fa-bolt"></i></h3>
                    <div class="chart-container"><canvas id="chartTurno"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>Performance por CD <i class="fas fa-warehouse"></i></h3>
                    <div class="chart-container"><canvas id="chartCD"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>Volumetria por Cargo <i class="fas fa-user-tie"></i></h3>
                    <div class="chart-container"><canvas id="chartCargo"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>Distribuição de Áreas <i class="fas fa-chart-pie"></i></h3>
                    <div class="chart-container"><canvas id="chartArea"></canvas></div>
                </div>
            </div>

            <div class="table-container">
                <div class="table-toolbar">
                    <div style="font-weight: 800; font-size: 12px; letter-spacing: 0.5px;">
                        <i class="fas fa-list-ul"></i> DATABASE NACIONAL EM TEMPO REAL
                    </div>
                    <div class="counter" id="reg-count">0 REGISTROS</div>
                </div>

                <div class="scroll-area">
                    <table>
                        <thead>
                            <tr>
                                <th>Data e Hora</th>
                                <th>Turno</th>
                                <th>CD</th>
                                <th>Responsável</th>
                                <th>Cargo</th>
                                <th>Área</th>
                            </tr>
                        </thead>
                        <tbody id="main-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Registrar Plugin de Labels Globais
        Chart.register(ChartDataLabels);

        const App = {
            database: [
                {data: '12/05/2026 15:37:16', turno: 'T1', cd: 'Jaboatão', resp: 'Guioberto', cargo: 'Supervisor', area: 'Checking Leve'},
                {data: '12/05/2026 16:05:44', turno: 'T1', cd: 'Franco 1', resp: 'Giovane Torre', cargo: 'Supervisor Turno', area: 'Checking Leve'},
                {data: '12/05/2026 19:28:19', turno: 'T1', cd: 'Hidrolândia', resp: 'Marleide Gomes', cargo: 'Team Leader', area: 'Checking Leve'},
                {data: '12/05/2026 20:04:03', turno: 'T2', cd: 'Nova Santa Rita', resp: 'Daniele Geringer', cargo: 'Supervisor', area: 'Picking Leve'},
                {data: '12/05/2026 20:22:50', turno: 'T2', cd: 'Hidrolândia', resp: 'Tamiles Oliveira', cargo: 'Team Leader', area: 'Inbound'},
                {data: '12/05/2026 20:34:06', turno: 'T2', cd: 'Nova Santa Rita', resp: 'Leonardo Oliveira', cargo: 'Supervisor', area: 'Inbound'},
                {data: '12/05/2026 23:15:25', turno: 'T2', cd: 'Jaboatão', resp: 'Pedro Aurélio', cargo: 'Supervisor', area: 'Inventário'},
                {data: '12/05/2026 23:42:44', turno: 'T2', cd: 'Jaboatão', resp: 'Guilherme Cruz', cargo: 'Supervisor', area: 'Qualidade'},
                {data: '13/05/2026 06:51:21', turno: 'T1', cd: 'Franco 1', resp: 'Cezar Terenzi', cargo: 'Supervisor', area: 'Shipping'},
                {data: '13/05/2026 07:50:06', turno: 'T3', cd: 'Franco 1', resp: 'Joyce Barros', cargo: 'Supervisor Turno', area: 'Picking Leve'}
            ],
            charts: {},

            init() {
                this.setupCharts();
                this.filter();
                setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
            },

            setupCharts() {
                const baseOptions = {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            color: '#fff',
                            anchor: 'end',
                            align: 'top',
                            offset: -2,
                            font: { weight: '800', size: 10, family: 'JetBrains Mono' }
                        }
                    },
                    scales: {
                        y: { grid: { color: '#161b22' }, ticks: { display: false } },
                        x: { grid: { display: false }, ticks: { color: '#8b949e', font: { size: 10 } } }
                    }
                };

                // Gráfico Turno
                this.charts.turno = new Chart(document.getElementById('chartTurno'), {
                    type: 'bar',
                    data: { labels: [], datasets: [{ backgroundColor: '#ee4d2d', data: [], borderRadius: 6 }] },
                    options: baseOptions
                });

                // Gráfico CD
                this.charts.cd = new Chart(document.getElementById('chartCD'), {
                    type: 'bar',
                    data: { labels: [], datasets: [{ backgroundColor: '#2f81f7', data: [], borderRadius: 6 }] },
                    options: baseOptions
                });

                // Gráfico Cargo (Novo)
                this.charts.cargo = new Chart(document.getElementById('chartCargo'), {
                    type: 'bar',
                    data: { labels: [], datasets: [{ backgroundColor: '#3fb950', data: [], borderRadius: 6 }] },
                    options: baseOptions
                });

                // Gráfico Área
                this.charts.area = new Chart(document.getElementById('chartArea'), {
                    type: 'doughnut',
                    data: { labels: [], datasets: [{ backgroundColor: ['#ee4d2d', '#2f81f7', '#3fb950', '#f1e05a'], data: [] }] },
                    options: { 
                        ...baseOptions, 
                        cutout: '70%', 
                        plugins: { 
                            legend: { display: false },
                            datalabels: { color: '#fff', font: { weight: 'bold' } }
                        } 
                    }
                });
            },

            filter() {
                const t = document.getElementById('f-turno').value;
                const c = document.getElementById('f-cd').value;
                const g = document.getElementById('f-cargo').value;
                const s = document.getElementById('f-search').value.toLowerCase();

                const filtered = this.database.filter(i => 
                    (!t || i.turno === t) && (!c || i.cd === c) && 
                    (!g || i.cargo === g) && (i.resp.toLowerCase().includes(s))
                );

                this.renderTable(filtered);
                this.updateCharts(filtered);
            },

            renderTable(data) {
                document.getElementById('reg-count').innerText = `${data.length} REGISTROS ENCONTRADOS`;
                document.getElementById('main-table').innerHTML = data.map(r => `
                    <tr>
                        <td class="time-txt">${r.data}</td>
                        <td><b>${r.turno}</b></td>
                        <td>${r.cd}</td>
                        <td>${r.resp}</td>
                        <td style="color:#8b949e">${r.cargo}</td>
                        <td><span class="badge">${r.area}</span></td>
                    </tr>
                `).join('');
            },

            updateCharts(data) {
                const process = (key) => {
                    const res = {};
                    data.forEach(i => res[i[key]] = (res[i[key]] || 0) + 1);
                    return { labels: Object.keys(res), values: Object.values(res) };
                };

                const update = (chart, key) => {
                    const d = process(key);
                    chart.data.labels = d.labels;
                    chart.data.datasets[0].data = d.values;
                    chart.update();
                };

                update(this.charts.turno, 'turno');
                update(this.charts.cd, 'cd');
                update(this.charts.cargo, 'cargo');
                update(this.charts.area, 'area');
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
