<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS-BR | DASHBOARD FULLSCREEN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        :root {
            --brand-primary: #ff4d2d;
            --bg-main: #010409;
            --bg-surface: #0d1117;
            --bg-elevated: #161b22;
            --border-thin: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #7d8590;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-main); 
            color: var(--text-primary); 
            font-family: 'Inter', sans-serif;
            height: 100vh; /* Altura total da tela */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Trava o scroll da página inteira */
        }

        header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-thin);
            padding: 10px 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* --- CONTAINER PRINCIPAL --- */
        .main-container {
            flex: 1; /* Ocupa todo o resto da tela */
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
            min-height: 0; /* Essencial para o scroll interno funcionar */
        }

        /* GRID DE CARDS - OCUPA PARTE SUPERIOR */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            height: 280px; /* Altura fixa para os gráficos */
            flex-shrink: 0;
        }

        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border-thin);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .chart-box { flex: 1; min-height: 0; width: 100%; }

        /* SEÇÃO DA TABELA - OCUPA O RESTO DA TELA */
        .data-section {
            background: var(--bg-surface);
            border: 1px solid var(--border-thin);
            border-radius: 6px;
            flex: 1; /* Estica para preencher o espaço restante */
            display: flex;
            flex-direction: column;
            min-height: 0; 
        }

        .table-header {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-thin);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        /* ÁREA DE SCROLL DA TABELA */
        .table-scroll-area {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        thead th {
            position: sticky;
            top: 0;
            background: var(--bg-elevated);
            padding: 12px 15px;
            text-align: left;
            z-index: 10;
            border-bottom: 1px solid var(--border-thin);
        }

        tbody td { padding: 10px 15px; border-bottom: 1px solid rgba(48, 54, 61, 0.5); }

        .tag {
            padding: 2px 6px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-thin);
            border-radius: 4px;
            font-size: 10px;
            color: #38bdf8;
        }

        /* ESTILO DOS SELECTS */
        .control-item {
            background: var(--bg-elevated);
            border: 1px solid var(--border-thin);
            color: var(--text-primary);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            outline: none;
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 800; letter-spacing: 1.5px;">EOS<span style="color:var(--brand-primary)">BR</span></div>
        <div style="display: flex; gap: 10px;">
            <select class="control-item"><option>TURNO</option></select>
            <select class="control-item"><option>CDs</option></select>
            <select class="control-item"><option>CARGOS</option></select>
        </div>
        <div style="font-family: 'JetBrains Mono'; font-size: 12px; color: var(--text-secondary);">15:03:22</div>
    </header>

    <div class="main-container">
        <!-- Dashboard Superior -->
        <div class="dashboard-grid">
            <div class="card"><div class="chart-box"><canvas id="c1"></canvas></div></div>
            <div class="card"><div class="chart-box"><canvas id="c2"></canvas></div></div>
            <div class="card"><div class="chart-box"><canvas id="c3"></canvas></div></div>
            <div class="card"><div class="chart-box"><canvas id="c4"></canvas></div></div>
        </div>

        <!-- Tabela Inferior -->
        <div class="data-section">
            <div class="table-header">
                HISTÓRICO GERAL - EOS BR
                <span style="background: var(--brand-primary); color: white; padding: 2px 6px; border-radius: 3px;">10 UNITS</span>
            </div>
            <div class="table-scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th>DATA E HORA</th>
                            <th>TURNO</th>
                            <th>CD</th>
                            <th>RESPONSÁVEL</th>
                            <th>ÁREA</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Dados populados via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Dados simplificados para preencher a tela
        const data = [
            {time: '12/05/2026 15:37:16', t: 'T1', cd: 'Jaboatão', r: 'Guioberto', a: 'Checking Leve'},
            {time: '12/05/2026 16:05:44', t: 'T1', cd: 'Franco 1', r: 'Giovane Torre', a: 'Checking Leve'},
            {time: '12/05/2026 19:28:19', t: 'T1', cd: 'Hidrolândia', r: 'Marleide Gomes', a: 'Checking Leve'},
            {time: '12/05/2026 20:04:03', t: 'T2', cd: 'Nova Santa Rita', r: 'Daniele Geringer', a: 'Picking Leve'},
            {time: '12/05/2026 20:22:50', t: 'T2', cd: 'Hidrolândia', r: 'Tamiles Oliveira', a: 'Inbound'},
            {time: '12/05/2026 20:34:06', t: 'T2', cd: 'Nova Santa Rita', r: 'Leonardo Oliveira', a: 'Inbound'},
            {time: '12/05/2026 21:10:15', t: 'T3', cd: 'Jaboatão', r: 'Pedro Silva', a: 'Shipping'},
            {time: '12/05/2026 22:00:00', t: 'T3', cd: 'Franco 1', r: 'Ana Souza', a: 'Returns'}
        ];

        document.getElementById('table-body').innerHTML = data.map(item => `
            <tr>
                <td style="color:var(--brand-primary); font-family:'JetBrains Mono'">${item.time}</td>
                <td><b>${item.t}</b></td>
                <td>${item.cd}</td>
                <td>${item.r}</td>
                <td><span class="tag">${item.a}</span></td>
            </tr>
        `).join('');

        // Inicialização rápida dos gráficos
        const ctxConfig = (color) => ({
            type: 'bar',
            data: { labels: ['A', 'B', 'C'], datasets: [{ data: [10, 20, 15], backgroundColor: color }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        new Chart(document.getElementById('c1'), ctxConfig('#ff4d2d'));
        new Chart(document.getElementById('c2'), ctxConfig('#38bdf8'));
        new Chart(document.getElementById('c3'), ctxConfig('#238636'));
        new Chart(document.getElementById('c4'), { type: 'doughnut', data: { datasets: [{ data: [30, 70], backgroundColor: ['#ff4d2d', '#161b22'] }] }, options: { maintainAspectRatio: false } });
    </script>
</body>
</html>
