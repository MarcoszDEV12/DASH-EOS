<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee | Operational Performance Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --shopee-orange: #EE4D2D;
            --shopee-glow: rgba(238, 77, 45, 0.4);
            --bg-deep: #05070A;
            --bg-card: #0D1117;
            --bg-hover: #161B22;
            --border: #30363D;
            --text-main: #F0F6FC;
            --text-dim: #8B949E;
            --glass: rgba(13, 17, 23, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; }

        /* Sidebar com Estilo image_1cc1d6.png */
        aside { width: 260px; height: 100vh; background: var(--bg-card); border-right: 1px solid var(--border); padding: 25px; position: fixed; }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--shopee-orange); }
        
        nav ul { list-style: none; }
        nav li {
            padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; cursor: pointer;
            transition: 0.3s; color: var(--text-dim); display: flex; align-items: center; gap: 12px;
            position: relative;
        }
        nav li:hover { background: var(--bg-hover); color: var(--text-main); }
        
        /* Efeito de borda neon conforme image_1cc1d6.png */
        nav li.active { 
            background: var(--bg-hover); 
            color: var(--shopee-orange); 
        }
        nav li.active::before {
            content: ""; position: absolute; left: -2px; top: 15%; height: 70%; width: 4px;
            background: var(--shopee-orange); border-radius: 4px;
            box-shadow: 0 0 10px var(--shopee-orange);
        }

        main { flex: 1; margin-left: 260px; padding: 25px; min-height: 100vh; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; background: var(--glass); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 16px; border: 1px solid var(--border);
        }
        .header-search { display: flex; align-items: center; background: #161B22; border-radius: 10px; padding: 8px 15px; width: 350px; }
        .header-search input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; }

        .filter-bar { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        select { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 10px 15px; border-radius: 10px; cursor: pointer; }

        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: 0.4s; }
        .kpi-card:hover { border-color: var(--shopee-orange); transform: translateY(-5px); }
        .kpi-card i { color: var(--shopee-orange); font-size: 20px; margin-bottom: 15px; }
        .kpi-card .value { font-size: 28px; font-weight: 800; display: block; }
        .kpi-card .label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; }

        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin-bottom: 30px; }
        .chart-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; height: 320px; }
        .chart-container h3 { font-size: 12px; color: var(--text-dim); margin-bottom: 15px; }

        .table-area { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }
        .scroll-wrapper { overflow-x: auto; max-height: 400px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 12px; color: var(--text-dim); font-size: 11px; border-bottom: 1px solid var(--border); background: var(--bg-card); position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        .badge { background: rgba(238,77,45,0.1); color: var(--shopee-orange); padding: 4px 8px; border-radius: 4px; font-weight: 600; font-size: 11px; }

        #loading-screen { position: fixed; inset: 0; background: var(--bg-deep); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .loader { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--shopee-orange); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="loader"></div></div>

    <aside>
        <div class="logo"><i class="fa-solid fa-bag-shopping"></i> <h1>EOS<span>BR</span></h1></div>
        <nav>
            <ul>
                <li class="active"><i class="fa-solid fa-chart-line"></i> <span>Dashboard</span></li>
                <li><i class="fa-solid fa-box"></i> <span>Operações</span></li>
                <li><i class="fa-solid fa-truck-fast"></i> <span>Logística</span></li>
                <li><i class="fa-solid fa-users"></i> <span>Equipe</span></li>
                <li><i class="fa-solid fa-gear"></i> <span>Configurações</span></li>
            </ul>
        </nav>
    </aside>

    <main>
        <header>
            <div>
                <h2>Operational Performance</h2>
                <p id="real-time-clock" style="color: var(--text-dim); font-size: 12px;"></p>
            </div>
            <div class="header-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="mainSearch" placeholder="Buscar nos registros estáticos..." onkeyup="App.filterAll()">
            </div>
        </header>

        <div class="filter-bar">
            <select id="f-cd" onchange="App.filterAll()"><option value="">Todos CDs</option></select>
            <select id="f-turno" onchange="App.filterAll()"><option value="">Todos Turnos</option></select>
            <select id="f-area" onchange="App.filterAll()"><option value="">Todas Áreas</option></select>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <i class="fa-solid fa-list-check"></i>
                <span class="label">Registros Hoje</span>
                <span class="value" id="kpi-total">0</span>
            </div>
            <div class="kpi-card">
                <i class="fa-solid fa-bolt"></i>
                <span class="label">Turno Dominante</span>
                <span class="value" id="kpi-turno">-</span>
            </div>
            <div class="kpi-card">
                <i class="fa-solid fa-location-dot"></i>
                <span class="label">CD em Foco</span>
                <span class="value" id="kpi-cd">-</span>
            </div>
            <div class="kpi-card">
                <i class="fa-solid fa-microchip"></i>
                <span class="label">Setor Ativo</span>
                <span class="value" id="kpi-area">-</span>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container"><h3>Volumetria por CD</h3><canvas id="chartCD"></canvas></div>
            <div class="chart-container"><h3>Distribuição por Área</h3><canvas id="chartArea"></canvas></div>
        </div>

        <div class="table-area">
            <h3>Histórico de Registros (Maio 2026)</h3>
            <div class="scroll-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>DATA/HORA</th>
                            <th>CD</th>
                            <th>TURNO</th>
                            <th>RESPONSÁVEL</th>
                            <th>CARGO</th>
                            <th>ÁREA</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const App = {
            // Dados inseridos manualmente conforme solicitado
            raw: [
                {ts: "12/05/2026 15:37:16", cd: "JABOATAO", turno: "T1", resp: "Guioberto", cargo: "SUPERVISOR", area: "CHECKING LEVE"},
                {ts: "12/05/2026 16:05:44", cd: "FRANCO 1", turno: "T1", resp: "GIOVANE TORRE", cargo: "SUPERVISOR TURNO", area: "CHECKING LEVE"},
                {ts: "12/05/2026 19:28:19", cd: "HIDROLÂNDIA", turno: "T1", resp: "Marleide Gomes", cargo: "TEAM LEADER", area: "CHECKING LEVE"},
                {ts: "12/05/2026 20:04:03", cd: "NOVA SANTA RITA", turno: "T2", resp: "Daniele Geringer", cargo: "SUPERVISOR", area: "PICKING LEVE"},
                {ts: "12/05/2026 20:22:50", cd: "HIDROLÂNDIA", turno: "T2", resp: "Tamiles Oliveira", cargo: "TEAM LEADER", area: "INBOUND"},
                {ts: "12/05/2026 20:34:06", cd: "NOVA SANTA RITA", turno: "T2", resp: "LEONARDO OLIVEIRA", cargo: "SUPERVISOR", area: "INBOUND"},
                {ts: "12/05/2026 23:15:25", cd: "JABOATAO", turno: "T2", resp: "Pedro Aurélio", cargo: "SUPERVISOR", area: "INVENTARIO"},
                {ts: "12/05/2026 23:42:44", cd: "JABOATAO", turno: "T2", resp: "Guilherme Cruz", cargo: "SUPERVISOR", area: "QUALIDADE"},
                {ts: "13/05/2026 06:51:21", cd: "FRANCO 1", turno: "T1", resp: "CESAR TERENZI", cargo: "SUPERVISOR", area: "SHIPPING"},
                {ts: "13/05/2026 07:46:18", cd: "FRANCO 1", turno: "T3", resp: "Maicon Luiz", cargo: "SUPERVISOR TURNO", area: "PICKING LEVE"},
                {ts: "13/05/2026 07:50:06", cd: "FRANCO 1", turno: "T3", resp: "Joyce Barros", cargo: "SUPERVISOR TURNO", area: "PICKING LEVE"},
                {ts: "13/05/2026 15:00:23", cd: "JABOATAO", turno: "T1", resp: "ELIAS COSTA", cargo: "SUPERVISOR", area: "INVENTARIO"},
                {ts: "13/05/2026 15:13:31", cd: "FRANCO 1", turno: "T1", resp: "ALISSON LOPES", cargo: "SUPERVISOR TURNO", area: "CHECKING LEVE"},
                {ts: "13/05/2026 15:16:55", cd: "FRANCO 1", turno: "T1", resp: "GIOVANE TORRE", cargo: "SUPERVISOR TURNO", area: "CHECKING LEVE"},
                {ts: "13/05/2026 15:19:06", cd: "FRANCO 1", turno: "T1", resp: "ANDRE LUIZ", cargo: "SUPERVISOR", area: "PICKING LEVE"}
            ],
            filtered: [],
            charts: {},

            init() {
                this.updateClock();
                this.populateFilters();
                this.initCharts();
                this.filterAll();
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 800);
            },

            updateClock() {
                const tick = () => {
                    document.getElementById('real-time-clock').innerText = new Date().toLocaleString('pt-BR');
                };
                setInterval(tick, 1000); tick();
            },

            populateFilters() {
                const cds = [...new Set(this.raw.map(i => i.cd))];
                const turnos = [...new Set(this.raw.map(i => i.turno))];
                const areas = [...new Set(this.raw.map(i => i.area))];

                const fill = (id, list) => {
                    const el = document.getElementById(id);
                    list.forEach(item => el.innerHTML += `<option value="${item}">${item}</option>`);
                };

                fill('f-cd', cds); fill('f-turno', turnos); fill('f-area', areas);
            },

            filterAll() {
                const q = document.getElementById('mainSearch').value.toLowerCase();
                const fCd = document.getElementById('f-cd').value;
                const fTr = document.getElementById('f-turno').value;
                const fAr = document.getElementById('f-area').value;

                this.filtered = this.raw.filter(i => {
                    return (!fCd || i.cd === fCd) && (!fTr || i.turno === fTr) && (!fAr || i.area === fAr) &&
                           (Object.values(i).some(v => v.toLowerCase().includes(q)));
                });
                this.updateUI();
            },

            updateUI() {
                document.getElementById('kpi-total').innerText = this.filtered.length;
                document.getElementById('kpi-turno').innerText = this.getMode('turno');
                document.getElementById('kpi-cd').innerText = this.getMode('cd');
                document.getElementById('kpi-area').innerText = this.getMode('area');

                const tbody = document.getElementById('table-body');
                tbody.innerHTML = this.filtered.slice().reverse().map(r => `
                    <tr>
                        <td style="color:var(--shopee-orange); font-family:'JetBrains Mono'; font-size:11px;">${r.ts}</td>
                        <td><b>${r.cd}</b></td>
                        <td>${r.turno}</td>
                        <td>${r.resp}</td>
                        <td style="color:var(--text-dim)">${r.cargo}</td>
                        <td><span class="badge">${r.area}</span></td>
                    </tr>
                `).join('');

                this.updateCharts();
            },

            getMode(key) {
                if(!this.filtered.length) return '-';
                const counts = {};
                this.filtered.forEach(i => counts[i[key]] = (counts[i[key]] || 0) + 1);
                return Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            },

            initCharts() {
                const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };
                
                this.charts.cd = new Chart(document.getElementById('chartCD'), {
                    type: 'bar',
                    data: { labels: [], datasets: [{ backgroundColor: '#EE4D2D', data: [] }] },
                    options: opt
                });

                this.charts.area = new Chart(document.getElementById('chartArea'), {
                    type: 'doughnut',
                    data: { labels: [], datasets: [{ backgroundColor: ['#EE4D2D', '#2f81f7', '#3fb950', '#f1e05a'], data: [] }] },
                    options: { ...opt, plugins: { legend: { display: true, position: 'right', labels: { color: '#fff', font: { size: 10 } } } } }
                });
            },

            updateCharts() {
                const count = (key) => {
                    const obj = {};
                    this.filtered.forEach(i => obj[i[key]] = (obj[i[key]] || 0) + 1);
                    return { l: Object.keys(obj), v: Object.values(obj) };
                };

                const cdData = count('cd');
                this.charts.cd.data.labels = cdData.l;
                this.charts.cd.data.datasets[0].data = cdData.v;
                this.charts.cd.update();

                const arData = count('area');
                this.charts.area.data.labels = arData.l;
                this.charts.area.data.datasets[0].data = arData.v;
                this.charts.area.update();
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
