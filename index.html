<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS-BR | MONITORAMENTO NACIONAL</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js + Plugin para Números no Gráfico -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        /* --- 1. DESIGN SYSTEM --- */
        :root {
            --shopee-orange: #ee4d2d;
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --bg-hover: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-blue: #2f81f7;
            --accent-green: #3fb950;
            --accent-purple: #8957e5;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- 2. HEADER HUD --- */
        header {
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 15px 40px;
            z-index: 1000;
        }

        .hud-wrapper {
            max-width: 1800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 180px 1fr 180px;
            gap: 30px;
            align-items: center;
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span { color: var(--shopee-orange); }

        .filter-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr) 1.5fr;
            gap: 12px;
        }

        .filter-group select, .search-box input {
            width: 100%;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            transition: var(--transition);
        }

        .filter-group select:hover { border-color: var(--shopee-orange); }
        .search-box { position: relative; }
        .search-box input { padding-left: 40px; }
        .search-box i { position: absolute; left: 15px; top: 12px; color: var(--text-dim); }

        .sys-info { text-align: right; font-family: var(--font-code); font-size: 13px; color: var(--shopee-orange); }

        /* --- 3. DASHBOARD VIEWPORT --- */
        .viewport {
            flex: 1;
            padding: 20px 40px;
            overflow-y: auto;
            background: radial-gradient(circle at 50% 0%, rgba(238, 77, 45, 0.08), transparent);
        }

        .container { max-width: 1800px; margin: 0 auto; }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            height: 300px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .chart-card h3 {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-card h3 i { color: var(--shopee-orange); }

        /* --- 4. DATA TABLE --- */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .table-toolbar {
            padding: 15px 25px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .counter {
            background: rgba(238, 77, 45, 0.1);
            color: var(--shopee-orange);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            border: 1px solid rgba(238, 77, 45, 0.2);
        }

        .scroll-area { max-height: 400px; overflow-y: auto; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead th {
            position: sticky; top: 0;
            background: #0d1117;
            padding: 15px 25px;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 12px 25px;
            font-size: 13px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
        }

        .badge { padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: 700; }
        .bg-area { background: rgba(47, 129, 247, 0.1); color: var(--accent-blue); border: 1px solid rgba(47, 129, 247, 0.2); }
        .time-txt { color: var(--shopee-orange); font-family: var(--font-code); }

        .live-icon { color: var(--accent-green); animation: blink 2s infinite; font-size: 8px; margin-right: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    </style>
</head>
<body>

    <header>
        <div class="hud-wrapper">
            <div class="logo"><h1>EOS<span>BR</span></h1></div>
            
            <div class="filter-bar">
                <select id="f-turno" onchange="App.filter()">
                    <option value="">TURNOS</option>
                    <option value="T1">T1</option><option value="T2">T2</option><option value="T3">T3</option>
                </select>
                <select id="f-cd" onchange="App.filter()">
                    <option value="">FILTRAR CD</option>
                    <option value="Jaboatão">JABOATÃO</option>
                    <option value="Franco 1">FRANCO 1</option>
                    <option value="Hidrolândia">HIDROLÂNDIA</option>
                    <option value="Nova Santa Rita">NOVA SANTA RITA</option>
                </select>
                <select id="f-cargo" onchange="App.filter()">
                    <option value="">CARGOS</option>
                    <option value="Supervisor">SUPERVISOR</option>
                    <option value="Team Leader">TEAM LEADER</option>
                    <option value="Supervisor Turno">SUP. TURNO</option>
                </select>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="f-search" placeholder="Responsável/Área..." onkeyup="App.filter()">
                </div>
            </div>

            <div class="sys-info" id="clock">00:00:00</div>
        </div>
    </header>

    <main class="viewport">
        <div class="container">
            <div class="analytics-grid">
                <div class="chart-card">
                    <h3><i class="fas fa-clock"></i> Por Turno</h3>
                    <canvas id="chartTurno"></canvas>
                </div>
                <div class="chart-card">
                    <h3><i class="fas fa-warehouse"></i> Por CD</h3>
                    <canvas id="chartCD"></canvas>
                </div>
                <div class="chart-card">
                    <h3><i class="fas fa-id-badge"></i> Por Cargo</h3>
                    <canvas id="chartCargo"></canvas>
                </div>
                <div class="chart-card">
                    <h3><i class="fas fa-layer-group"></i> Por Área</h3>
                    <canvas id="chartArea"></canvas>
                </div>
            </div>

            <div class="table-container">
                <div class="table-toolbar">
                    <div style="font-weight: 800; font-size: 12px; letter-spacing: 1px;">
                        <i class="fas fa-circle live-icon"></i> MONITORAMENTO EM TEMPO REAL
                    </div>
                    <div class="counter" id="reg-count">0 REGISTROS</div>
                </div>

                <div class="scroll-area">
                    <table>
                        <thead>
                            <tr>
                                <th>Data/Hora</th>
                                <th>Turno</th>
                                <th>CD</th>
                                <th>Responsável</th>
                                <th>Cargo</th>
                                <th>Área</th>
                            </tr>
                        </thead>
                        <tbody id="main-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Registrar o plugin de labels para todos os gráficos
        Chart.register(ChartDataLabels);

        const App = {
            database: [
                {data: '12/05/2026 15:37:16', turno: 'T1', cd: 'Jaboatão', resp: 'Guioberto', cargo: 'Supervisor', area: 'Checking Leve'},
                {data: '12/05/2026 16:05:44', turno: 'T1', cd: 'Franco 1', resp: 'Giovane Torre', cargo: 'Supervisor Turno', area: 'Checking Leve'},
                {data: '12/05/2026 19:28:19', turno: 'T1', cd: 'Hidrolândia', resp: 'Marleide Gomes', cargo: 'Team Leader', area: 'Checking Leve'},
                {data: '12/05/2026 20:04:03', turno: 'T2', cd: 'Nova Santa Rita', resp: 'Daniele Geringer', cargo: 'Supervisor', area: 'Picking Leve'},
                {data: '12/05/2026 20:22:50', turno: 'T2', cd: 'Hidrolândia', resp: 'Tamiles Oliveira', cargo: 'Team Leader', area: 'Inbound'},
                {data: '12/05/2026 20:34:06', turno: 'T2', cd: 'Nova Santa Rita', resp: 'Leonardo Oliveira Fernandes', cargo: 'Supervisor', area: 'Inbound'},
                {data: '12/05/2026 23:15:25', turno: 'T2', cd: 'Jaboatão', resp: 'Pedro Aurélio', cargo: 'Supervisor', area: 'Inventário'},
                {data: '12/05/2026 23:42:44', turno: 'T2', cd: 'Jaboatão', resp: 'Guilherme Cruz', cargo: 'Supervisor', area: 'Qualidade'},
                {data: '13/05/2026 06:51:21', turno: 'T1', cd: 'Franco 1', resp: 'Cezar Terenzi', cargo: 'Supervisor', area: 'Shipping'},            
                {data: '13/05/2026 07:46:18', turno: 'T3', cd: 'Franco 1', resp: 'Maicon Luiz', cargo: 'Supervisor Turno', area: 'Picking Leve'},
                {data: '13/05/2026 07:50:06', turno: 'T3', cd: 'Franco 1', resp: 'Joyce Barros', cargo: 'Supervisor Turno', area: 'Picking Leve'}
            ],
            filtered: [],
            charts: {},

            init() {
                this.updateClock();
                this.renderCharts();
                this.filter();
                setInterval(() => this.updateClock(), 1000);
            },

            updateClock() {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            },

            filter() {
                const turno = document.getElementById('f-turno').value;
                const cd = document.getElementById('f-cd').value;
                const cargo = document.getElementById('f-cargo').value;
                const search = document.getElementById('f-search').value.toLowerCase();

                this.filtered = this.database.filter(item => {
                    return (turno === "" || item.turno === turno) &&
                           (cd === "" || item.cd === cd) &&
                           (cargo === "" || item.cargo === cargo) &&
                           (item.resp.toLowerCase().includes(search) || item.area.toLowerCase().includes(search));
                });

                this.renderTable();
                this.updateChartsData();
            },

            renderTable() {
                const tbody = document.getElementById('main-table');
                document.getElementById('reg-count').innerText = `${this.filtered.length} REGISTROS`;

                tbody.innerHTML = this.filtered.map(row => `
                    <tr>
                        <td class="time-txt">${row.data}</td>
                        <td><b>${row.turno}</b></td>
                        <td><b>${row.cd}</b></td>
                        <td>${row.resp}</td>
                        <td style="color: var(--text-dim)">${row.cargo}</td>
                        <td><span class="badge bg-area">${row.area}</span></td>
                    </tr>
                `).join('');
            },

            getChartDefaults(type = 'bar', color = '#ee4d2d') {
                return {
                    type: type,
                    data: { labels: [], datasets: [{ backgroundColor: color, borderRadius: 6, data: [] }] },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            datalabels: {
                                anchor: 'end',
                                align: 'top',
                                color: '#fff',
                                font: { weight: 'bold', family: 'JetBrains Mono', size: 10 }
                            }
                        },
                        scales: type === 'bar' ? {
                            y: { grid: { color: '#161b22' }, ticks: { display: false } },
                            x: { grid: { display: false }, ticks: { color: '#8b949e', font: { size: 9 } } }
                        } : {}
                    }
                };
            },

            renderCharts() {
                this.charts.turno = new Chart(document.getElementById('chartTurno'), this.getChartDefaults('bar', '#ee4d2d'));
                this.charts.cd = new Chart(document.getElementById('chartCD'), this.getChartDefaults('bar', '#2f81f7'));
                this.charts.cargo = new Chart(document.getElementById('chartCargo'), this.getChartDefaults('bar', '#8957e5'));
                
                // Área como Doughnut
                const areaDefaults = this.getChartDefaults('doughnut');
                areaDefaults.data.datasets[0].backgroundColor = ['#ee4d2d', '#2f81f7', '#3fb950', '#8957e5', '#f1e05a'];
                areaDefaults.options.plugins.legend = { display: false };
                areaDefaults.options.plugins.datalabels = { color: '#fff', font: { weight: 'bold' } };
                areaDefaults.options.cutout = '65%';
                this.charts.area = new Chart(document.getElementById('chartArea'), areaDefaults);
            },

            updateChartsData() {
                const count = (key) => {
                    const res = {};
                    this.filtered.forEach(d => res[d[key]] = (res[d[key]] || 0) + 1);
                    return { labels: Object.keys(res), values: Object.values(res) };
                };

                const update = (chart, key) => {
                    const d = count(key);
                    chart.data.labels = d.labels;
                    chart.data.datasets[0].data = d.values;
                    chart.update();
                };

                update(this.charts.turno, 'turno');
                update(this.charts.cd, 'cd');
                update(this.charts.cargo, 'cargo');
                update(this.charts.area, 'area');
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
