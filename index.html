<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE ANALÍTICO EOS-BR | Shopee Operations</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

    <style>
        :root {
            --shopee-orange: #ee4d2d;
            --shopee-orange-glow: rgba(238, 77, 45, 0.15);
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --bg-input: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-blue: #2f81f7;
            --accent-green: #3fb950;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- SKELETON LOADING --- */
        .skeleton { background: linear-gradient(90deg, #0d1117 25%, #161b22 50%, #0d1117 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- HEADER --- */
        header {
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 30px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-shopee { background: var(--shopee-orange); color: white; padding: 5px 10px; border-radius: 6px; font-weight: 800; font-size: 14px; }
        .logo-title { font-weight: 700; font-size: 16px; letter-spacing: -0.5px; }

        .header-tools { display: flex; align-items: center; gap: 25px; }
        .real-time-clock { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--shopee-orange); }

        /* --- FILTERS --- */
        .filter-section {
            padding: 20px 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            background: linear-gradient(180deg, rgba(13,17,23,1) 0%, rgba(5,7,10,1) 100%);
        }

        .filter-group select, .filter-group input[type="date"] {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 140px;
        }

        .filter-group select:hover, .filter-group input[type="date"]:hover { border-color: var(--shopee-orange); }
        .filter-group input[type="date"] { color-scheme: dark; }

        /* --- KPI GRID --- */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            padding: 0 30px 30px 30px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            border-color: var(--shopee-orange);
            box-shadow: 0 10px 30px var(--shopee-orange-glow);
        }

        .kpi-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .kpi-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(238, 77, 45, 0.1); color: var(--shopee-orange); }
        .kpi-trend { font-size: 12px; font-weight: 600; padding: 4px 8px; border-radius: 20px; }
        .trend-up { background: rgba(63, 185, 80, 0.1); color: var(--accent-green); }

        .kpi-label { font-size: 13px; color: var(--text-dim); font-weight: 500; }
        .kpi-value { font-size: 26px; font-weight: 800; margin-top: 5px; }

        /* --- CHARTS SECTION --- */
        .charts-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 0 30px 30px 30px;
        }

        .chart-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chart-box canvas {
            flex: 1;
            min-height: 0;
            width: 100% !important;
        }

        .chart-box-header { margin-bottom: 20px; font-weight: 700; font-size: 15px; color: var(--text-main); display: flex; align-items: center; gap: 10px; }

        /* --- TABLE SECTION --- */
        .table-section { padding: 0 30px 50px 30px; }
        .table-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .table-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-container { position: relative; }
        .search-container i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        .search-container input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 15px 10px 35px;
            border-radius: 10px;
            width: 300px;
        }

        .table-scroll { max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #161b22; padding: 15px 20px; font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; position: sticky; top: 0; }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover { background: rgba(238, 77, 45, 0.02); }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; background: var(--bg-input); }

        @media (max-width: 1024px) {
            .charts-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="logo-shopee">S</div>
        <div class="logo-title">CONTROLE ANALÍTICO <span style="color:var(--shopee-orange)">EOS-BR</span></div>
    </div>
    <div class="header-tools">
        <div class="real-time-clock" id="clock">08:00:00</div>
        <div class="kpi-trend trend-up">OPERACIONAL ATIVO</div>
    </div>
</header>

<div class="filter-section">
    <!-- Filtro Período de Data -->
    <div class="filter-group">
        <select id="filter-data-preset" onchange="Dashboard.handleDatePresetChange()">
            <option value="">Todo o Período</option>
            <option value="hoje">Hoje</option>
            <option value="ontem">Ontem</option>
            <option value="7dias">Últimos 7 dias</option>
            <option value="30dias">Últimos 30 dias</option>
            <option value="custom">Data Especifica...</option>
        </select>
    </div>
    <!-- Input de calendário oculto por padrão (aparece só se escolher "Customizado") -->
    <div class="filter-group" id="custom-date-container" style="display: none;">
        <input type="date" id="filter-data-custom" onchange="Dashboard.applyFilters()">
    </div>

    <div class="filter-group">
        <select id="filter-mes" onchange="Dashboard.applyFilters()">
            <option value="">Todos os Meses</option>
        </select>
    </div>
    <div class="filter-group">
        <select id="filter-turno" onchange="Dashboard.applyFilters()">
            <option value="">Todos os Turnos</option>
        </select>
    </div>
    <div class="filter-group">
        <select id="filter-cd" onchange="Dashboard.applyFilters()">
            <option value="">Todos os CDs</option>
        </select>
    </div>
    <div class="filter-group">
        <select id="filter-cargo" onchange="Dashboard.applyFilters()">
            <option value="">Todos os Cargos</option>
        </select>
    </div>
</div>

<div class="kpi-grid">
    <div class="kpi-card">
        <div class="kpi-header">
            <div class="kpi-icon"><i class="fas fa-clipboard-list"></i></div>
            <div class="kpi-trend trend-up">+12%</div>
        </div>
        <div class="kpi-label">Total de Registros</div>
        <div class="kpi-value" id="kpi-total">0</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-header">
            <div class="kpi-icon"><i class="fas fa-clock"></i></div>
        </div>
        <div class="kpi-label">Melhor Turno</div>
        <div class="kpi-value" id="kpi-turno">-</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-header">
            <div class="kpi-icon"><i class="fas fa-warehouse"></i></div>
        </div>
        <div class="kpi-label">CD Líder</div>
        <div class="kpi-value" id="kpi-cd">-</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-header">
            <div class="kpi-icon"><i class="fas fa-chart-line"></i></div>
            <div class="kpi-trend trend-up">98.2%</div>
        </div>
        <div class="kpi-label">Performance Geral</div>
        <div class="kpi-value">A+</div>
    </div>
</div>

<div class="charts-container">
    <div class="chart-box">
        <div class="chart-box-header"><i class="fas fa-bolt" style="color: var(--shopee-orange)"></i> Desempenho por Turno</div>
        <canvas id="chartTurno"></canvas>
    </div>
    <div class="chart-box">
        <div class="chart-box-header"><i class="fas fa-city" style="color: var(--accent-blue)"></i> Performance por CD</div>
        <canvas id="chartCD"></canvas>
    </div>
    <div class="chart-box">
        <div class="chart-box-header" id="headerChartCargo"><i class="fas fa-users" style="color: var(--shopee-orange)"></i> Distribuição por Cargo (Geral)</div>
        <canvas id="chartCargo"></canvas>
    </div>
    <div class="chart-box">
        <div class="chart-box-header" id="headerChartArea"><i class="fas fa-layer-group" style="color: var(--accent-green)"></i> Registros por Área (Geral)</div>
        <canvas id="chartArea"></canvas>
    </div>
</div>

<div class="table-section">
    <div class="table-wrapper">
        <div class="table-header">
            <div style="font-weight: 700">Histórico Detalhado</div>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="tableSearch" placeholder="Pesquisar registros..." onkeyup="Dashboard.applyFilters()">
            </div>
        </div>
        <div class="table-scroll">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th>Data e Hora</th>
                        <th>Mês</th>
                        <th>Turno</th>
                        <th>CD</th>
                        <th>Responsável</th>
                        <th>Cargo</th>
                        <th>Área</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Registro global obrigatório do plugin de rótulos do Chart.js
    Chart.register(ChartDataLabels);

    // Configurações Gerais - URL atualizada com formato CSV da planilha informada
    const SHEETS_URL = "https://docs.google.com/spreadsheets/d/11AUpBiacxRMwZ5QsSQ9JZotgKnGFvdG86qt0P64cP-Y/gviz/tq?tqx=out:csv&gid=2014298689";
    
    const Dashboard = {
        rawData: [],
        filteredData: [],
        charts: {},

        filterOptions: {
            meses: ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"],
            turnos: ["T1", "T2", "T3", "T4", "T5", "T6", "T7"],
            cds: ["BRPE1", "BRSP1", "BRSP2", "BRRS1", "BRMG1", "BRGO1"],
            cargos: ["TEAM LEADER", "PS", "COORDENADOR", "SUPERVISOR", "SUPERVISOR MWH", "SUPERVISOR TURNO"]
        },

        async init() {
            this.updateClock();
            setInterval(() => this.updateClock(), 1000);
            await this.fetchData();
            this.createCharts();
            this.populateFilters();
            this.applyFilters();
        },

        updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
        },

        handleDatePresetChange() {
            const preset = document.getElementById('filter-data-preset').value;
            const customContainer = document.getElementById('custom-date-container');
            
            if (preset === 'custom') {
                customContainer.style.display = 'block';
            } else {
                customContainer.style.display = 'none';
                document.getElementById('filter-data-custom').value = '';
            }
            this.applyFilters();
        },

        async fetchData() {
            // Carga de segurança estática inicial
            const staticData = [
                { "DATA E HORA": "12/05/2026 15:37:16", "MÊS": "Maio", "TURNO": "T1", "CD": "BRPE1", "NOME DO RESPONSÁVEL": "Guioberto", "CARGO": "SUPERVISOR", "ÁREA": "CHECKING LEVE" },
                { "DATA E HORA": "12/05/2026 16:05:44", "MÊS": "Maio", "TURNO": "T1", "CD": "BRSP1", "NOME DO RESPONSÁVEL": "GIOVANE TORRE", "CARGO": "SUPERVISOR TURNO", "ÁREA": "CHECKING LEVE" },
                { "DATA E HORA": "12/05/2026 19:28:19", "MÊS": "Maio", "TURNO": "T1", "CD": "BRGO1", "NOME DO RESPONSÁVEL": "Marleide Gomes", "CARGO": "TEAM LEADER", "ÁREA": "CHECKING LEVE" }
            ];

            try {
                const response = await fetch(SHEETS_URL);
                if (response.ok) {
                    const csvText = await response.text();
                    const parsed = this.parseCSV(csvText);
                    // Combina os dados estáticos base com o retorno em tempo real da planilha
                    this.rawData = [...staticData, ...parsed];
                } else {
                    this.rawData = staticData;
                }
            } catch (error) {
                console.error("Erro ao carregar dados externos, utilizando dados locais:", error);
                this.rawData = staticData;
            }
        },

        parseCSV(csv) {
            const lines = csv.split('\n');
            const result = [];
            if (lines.length === 0 || !lines[0]) return result;
            
            // Lê e limpa os cabeçalhos originais da sua planilha
            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());

            for (let i = 1; i < lines.length; i++) {
                const obj = {};
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (currentline.length < headers.length) continue;

                headers.forEach((header, index) => {
                    let val = currentline[index]?.replace(/"/g, '').trim();
                    if (!val) val = '';

                    // Mapeamento dinâmico baseado estritamente nas colunas enviadas da planilha
                    if (header === "Data / Hora") {
                        obj["DATA E HORA"] = val;
                        if (val) {
                            // Extrai o mês de forma automatizada com base na string da data (DD/MM/AAAA)
                            const dataPart = val.split(' ')[0];
                            const mesNum = parseInt(dataPart.split('/')[1], 10);
                            if (!isNaN(mesNum) && mesNum >= 1 && mesNum <= 12) {
                                obj["MÊS"] = this.filterOptions.meses[mesNum - 1];
                            }
                        }
                    } else if (header === "CD Operacional") {
                        // Conversão automatizada de nomes amigáveis para siglas padronizadas do sistema
                        if(val.toUpperCase() === 'JABOATÃO' || val.toUpperCase() === 'JABOATAO') val = 'BRPE1';
                        else if(val.toUpperCase() === 'FRANCO 1') val = 'BRSP1';
                        else if(val.toUpperCase() === 'FRANCO 2') val = 'BRSP2';
                        else if(val.toUpperCase() === 'HIDROLÂNDIA' || val.toUpperCase() === 'HIDRELANDIA') val = 'BRGO1';
                        else if(val.toUpperCase() === 'NOVA SANTA RITA') val = 'BRRS1';
                        else if(val.toUpperCase() === 'CONTAGEM') val = 'BRMG1';
                        obj["CD"] = val;
                    } else if (header === "Turno") {
                        obj["TURNO"] = val;
                    } else if (header === "Responsável") {
                        obj["NOME DO RESPONSÁVEL"] = val;
                    } else if (header === "Cargo") {
                        obj["CARGO"] = val.toUpperCase();
                    } else if (header === "Área Operacional") {
                        obj["ÁREA"] = val.toUpperCase();
                    }
                });
                
                // Só empurra para a lista se a linha possuir dados mínimos obrigatórios válidos
                if (obj["DATA E HORA"]) {
                    result.push(obj);
                }
            }
            return result;
        },

        populateFilters() {
            const fill = (id, list) => {
                const select = document.getElementById(id);
                select.innerHTML = select.options[0].outerHTML; 
                
                list.forEach(val => {
                    const opt = document.createElement('option');
                    opt.value = val;
                    opt.innerText = val;
                    select.appendChild(opt);
                });
            };

            fill('filter-mes', this.filterOptions.meses);
            fill('filter-turno', this.filterOptions.turnos);
            fill('filter-cd', this.filterOptions.cds);
            fill('filter-cargo', this.filterOptions.cargos);
        },

        applyFilters() {
            const fPreset = document.getElementById('filter-data-preset').value;
            const fCustomDate = document.getElementById('filter-data-custom').value;
            const fMes = document.getElementById('filter-mes').value;
            const fTurno = document.getElementById('filter-turno').value;
            const fCD = document.getElementById('filter-cd').value;
            const fCargo = document.getElementById('filter-cargo').value;
            const fSearch = document.getElementById('tableSearch').value.toLowerCase();

            const hoje = new Date();
            hoje.setHours(0,0,0,0);
            
            let dataInicio = null;
            let dataFim = null;

            if (fPreset === 'hoje') {
                dataInicio = new Date(hoje);
                dataFim = new Date(hoje);
                dataFim.setHours(23,59,59,999);
            } else if (fPreset === 'ontem') {
                dataInicio = new Date(hoje);
                dataInicio.setDate(hoje.getDate() - 1);
                dataFim = new Date(dataInicio);
                dataFim.setHours(23,59,59,999);
            } else if (fPreset === '7dias') {
                dataInicio = new Date(hoje);
                dataInicio.setDate(hoje.getDate() - 7);
                dataFim = new Date(hoje);
                dataFim.setHours(23,59,59,999);
            } else if (fPreset === '30dias') {
                dataInicio = new Date(hoje);
                dataInicio.setDate(hoje.getDate() - 30);
                dataFim = new Date(hoje);
                dataFim.setHours(23,59,59,999);
            } else if (fPreset === 'custom' && fCustomDate) {
                const partes = fCustomDate.split('-');
                dataInicio = new Date(partes[0], partes[1] - 1, partes[2], 0, 0, 0, 0);
                dataFim = new Date(partes[0], partes[1] - 1, partes[2], 23, 59, 59, 999);
            }

            const currentCDLabel = fCD ? `(${fCD})` : '(Geral)';
            document.getElementById('headerChartCargo').innerHTML = `<i class="fas fa-users" style="color: var(--shopee-orange)"></i> Distribuição por Cargo ${currentCDLabel}`;
            document.getElementById('headerChartArea').innerHTML = `<i class="fas fa-layer-group" style="color: var(--accent-green)"></i> Registros por Área ${currentCDLabel}`;

            this.filteredData = this.rawData.filter(item => {
                let passData = true;
                if (dataInicio && dataFim && item['DATA E HORA']) {
                    const dPartes = item['DATA E HORA'].split(' ');
                    const dataP = dPartes[0].split('/');
                    const horaP = dPartes[1] ? dPartes[1].split(':') : [0,0,0];
                    const itemDate = new Date(dataP[2], dataP[1] - 1, dataP[0], horaP[0], horaP[1], horaP[2]);
                    passData = (itemDate >= dataInicio && itemDate <= dataFim);
                }

                return passData &&
                       (!fMes || item['MÊS'] === fMes) &&
                       (!fTurno || item['TURNO'] === fTurno) &&
                       (!fCD || item['CD'] === fCD) &&
                       (!fCargo || item['CARGO'] === fCargo) &&
                       (Object.values(item).some(v => String(v).toLowerCase().includes(fSearch)));
            });

            this.updateUI();
        },

        updateUI() {
            document.getElementById('kpi-total').innerText = this.filteredData.length;
            
            const findTop = (key) => {
                if (this.filteredData.length === 0) return "-";
                const counts = {};
                this.filteredData.forEach(x => { if(x[key]) counts[x[key]] = (counts[x[key]] || 0) + 1; });
                const keys = Object.keys(counts);
                if (keys.length === 0) return "-";
                return keys.reduce((a, b) => counts[a] > counts[b] ? a : b);
            };

            document.getElementById('kpi-turno').innerText = findTop('TURNO');
            document.getElementById('kpi-cd').innerText = findTop('CD');

            const body = document.getElementById('tableBody');
            body.innerHTML = this.filteredData.map(item => `
                <tr>
                    <td style="color: var(--shopee-orange); font-weight:600">${item['DATA E HORA'] || ''}</td>
                    <td>${item['MÊS'] || ''}</td>
                    <td><span class="badge">${item['TURNO'] || ''}</span></td>
                    <td><b>${item['CD'] || ''}</b></td>
                    <td>${item['NOME DO RESPONSÁVEL'] || ''}</td>
                    <td>${item['CARGO'] || ''}</td>
                    <td><span class="badge" style="border-left: 3px solid var(--accent-green)">${item['ÁREA'] || ''}</span></td>
                </tr>
            `).join('');

            this.updateChartsData();
        },

        createCharts() {
            const globalLabelConfig = {
                display: true,
                color: '#fff',
                font: { weight: 'bold', size: 11 },
                formatter: (value) => value > 0 ? Math.floor(value) : ''
            };

            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { top: 25, right: 25, bottom: 10, left: 10 } },
                plugins: { 
                    legend: { display: false },
                    datalabels: { ...globalLabelConfig, anchor: 'end', align: 'end', offset: 4 }
                },
                scales: {
                    y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                    x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                }
            };

            // Gráfico de Turno
            this.charts.turno = new Chart(document.getElementById('chartTurno'), {
                type: 'bar',
                data: { labels: [], datasets: [{ backgroundColor: '#ee4d2d', borderRadius: 6, data: [] }] },
                options: { 
                    ...commonOptions, 
                    indexAxis: 'y',
                    plugins: {
                        legend: { display: false },
                        datalabels: { ...globalLabelConfig, anchor: 'end', align: 'right', offset: 4 }
                    }
                }
            });

            // Gráfico de CD (Empilhado por Cargo)
            const cargoColors = ['#ee4d2d', '#2f81f7', '#3fb950', '#8957e5', '#f85149', '#f1c40f'];
            const datasetsCD = this.filterOptions.cargos.map((cargo, index) => ({
                label: cargo,
                data: [],
                backgroundColor: cargoColors[index % cargoColors.length],
                borderRadius: 4
            }));

            this.charts.cd = new Chart(document.getElementById('chartCD'), {
                type: 'bar',
                data: { labels: this.filterOptions.cds, datasets: datasetsCD },
                options: {
                    ...commonOptions,
                    plugins: {
                        legend: { 
                            display: true,
                            position: 'top',
                            labels: { color: '#8b949e', font: { size: 10 } }
                        },
                        datalabels: {
                            ...globalLabelConfig,
                            anchor: 'center',
                            align: 'center'
                        }
                    },
                    scales: {
                        y: { stacked: true, grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                        x: { stacked: true, grid: { display: false }, ticks: { color: '#8b949e' } }
                    }
                }
            });

            // Gráfico de Cargos (Rosca)
            this.charts.cargo = new Chart(document.getElementById('chartCargo'), {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#ee4d2d', '#2f81f7', '#3fb950', '#8957e5', '#f85149', '#f1c40f'], borderColor: '#0d1117', borderWidth: 2 }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'right', labels: { color: '#8b949e', font: { size: 11 } } },
                        datalabels: { ...globalLabelConfig, formatter: (value, ctx) => { let sum = 0; let dataArr = ctx.chart.data.datasets[0].data; dataArr.map(data => { sum += data; }); let percentage = (value*100 / sum).toFixed(0)+"%"; return value > 0 ? percentage : ''; } }
                    }
                }
            });

            // Gráfico de Áreas (Barras)
            this.charts.area = new Chart(document.getElementById('chartArea'), {
                type: 'bar',
                data: { labels: [], datasets: [{ backgroundColor: '#3fb950', borderRadius: 6, data: [] }] },
                options: { ...commonOptions }
            });
        },

        updateChartsData() {
            // 1. Processa Turnos
            const turnosData = {};
            this.filterOptions.turnos.forEach(t => turnosData[t] = 0);
            this.filteredData.forEach(item => { if (item['TURNO'] && turnosData[item['TURNO']] !== undefined) turnosData[item['TURNO']]++; });
            
            this.charts.turno.data.labels = Object.keys(turnosData);
            this.charts.turno.data.datasets[0].data = Object.values(turnosData);
            this.charts.turno.update();

            // 2. Processa CDs (Empilhado por Cargo)
            this.charts.cd.data.datasets.forEach(dataset => {
                const cargo = dataset.label;
                dataset.data = this.filterOptions.cds.map(cd => {
                    return this.filteredData.filter(item => item['CD'] === cd && item['CARGO'] === cargo).length;
                });
            });
            this.charts.cd.update();

            // 3. Processa Cargos
            const cargosCount = {};
            this.filteredData.forEach(item => { if (item['CARGO']) cargosCount[item['CARGO']] = (cargosCount[item['CARGO']] || 0) + 1; });
            
            this.charts.cargo.data.labels = Object.keys(cargosCount);
            this.charts.cargo.data.datasets[0].data = Object.values(cargosCount);
            this.charts.cargo.update();

            // 4. Processa Áreas
            const areasCount = {};
            this.filteredData.forEach(item => { if (item['ÁREA']) areasCount[item['ÁREA']] = (areasCount[item['ÁREA']] || 0) + 1; });
            
            // Ordena as áreas de forma decrescente para melhor legibilidade
            const sortedAreas = Object.keys(areasCount).sort((a,b) => areasCount[b] - areasCount[a]).slice(0, 8);
            
            this.charts.area.data.labels = sortedAreas;
            this.charts.area.data.datasets[0].data = sortedAreas.map(a => areasCount[a]);
            this.charts.area.update();
        }
    };

    window.onload = () => Dashboard.init();
</script>
</body>
</html>
