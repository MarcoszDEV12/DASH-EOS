<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS-BR | MONITORAMENTO REAL PMPE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --shopee-orange: #ee4d2d;
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-blue: #2f81f7;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER & FILTROS --- */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 15px 40px;
            z-index: 100;
        }

        .hud-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr) 2fr;
            gap: 15px;
            align-items: center;
        }

        .hud-item select, .hud-search input {
            width: 100%;
            background: #161b22;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 13px;
            transition: 0.3s;
            outline: none;
        }

        .hud-item select:hover, .hud-search input:focus { border-color: var(--shopee-orange); }

        /* --- VIEWPORT PRINCIPAL --- */
        .main-content {
            flex: 1;
            padding: 25px 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(238, 77, 45, 0.08), transparent);
        }

        .analytics-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            height: 300px;
        }

        .chart-card h3 {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- TABELA DE DADOS REAIS --- */
        .table-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 50px;
        }

        .table-header {
            padding: 20px 25px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .scroll-container { max-height: 800px; overflow-y: auto; }

        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { 
            position: sticky; top: 0; background: #010409; 
            padding: 15px 25px; font-size: 11px; color: var(--text-dim); 
            text-transform: uppercase; z-index: 10;
        }
        td { padding: 15px 25px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:hover { background: rgba(238, 77, 45, 0.03); }

        .time-cell { color: var(--shopee-orange); font-family: var(--font-code); font-weight: 600; }
        .idle-tag { 
            font-family: var(--font-code); color: #ff7b72; 
            background: rgba(248, 81, 73, 0.1); padding: 4px 10px; 
            border-radius: 6px; font-weight: 700;
        }
        .area-badge { background: rgba(47, 129, 247, 0.1); color: var(--accent-blue); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }

    </style>
</head>
<body>

    <header>
        <div class="hud-grid">
            <div class="hud-item"><select id="f-mes"><option>MAIO 2026</option></select></div>
            <div class="hud-item"><select id="f-turno"><option value="">TURNOS (TODOS)</option></select></div>
            <div class="hud-item"><select id="f-cd"><option value="">CDs (TODOS)</option></select></div>
            <div class="hud-item"><select id="f-area"><option value="">ÁREAS (TODAS)</option></select></div>
            <div class="hud-search"><input type="text" id="searchInput" placeholder="BUSCAR POR RESPONSÁVEL..."></div>
        </div>
    </header>

    <main class="main-content">
        <div class="analytics-row">
            <div class="chart-card"><h3><i class="fas fa-clock"></i> Bipes por Turno</h3><canvas id="cTurno"></canvas></div>
            <div class="chart-card"><h3><i class="fas fa-warehouse"></i> Registros por CD</h3><canvas id="cCD"></canvas></div>
            <div class="chart-card"><h3><i class="fas fa-chart-pie"></i> Fluxo por Área</h3><canvas id="cArea"></canvas></div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <div style="font-weight: 800; letter-spacing: 1px;">BASE DE DADOS REAL - EOS-BR</div>
                <div id="counter" style="color: var(--shopee-orange); font-weight: 800;">0 REGISTROS</div>
            </div>
            <div class="scroll-container">
                <table>
                    <thead>
                        <tr>
                            <th>DATA E HORA</th>
                            <th>TURNO</th>
                            <th>CD</th>
                            <th>RESPONSÁVEL</th>
                            <th>CARGO</th>
                            <th>ÁREA</th>
                            <th>IDLE</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Dados Injetados -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // DADOS REAIS EXTRAÍDOS DO SEU TEXTO
        const DATA_REAIS = [
            {data: '12/05/2026 15:37:16', cd: 'JABOATÃO', turno: 'T1', resp: 'Guioberto', cargo: 'SUPERVISOR', area: 'CHECKING LEVE', idle: '0'},
            {data: '12/05/2026 16:05:44', cd: 'FRANCO 1', turno: 'T1', resp: 'GIOVANE TORRE', cargo: 'SUPERVISOR TURNO', area: 'CHECKING LEVE', idle: '0'},
            {data: '12/05/2026 19:28:19', cd: 'HIDROLÂNDIA', turno: 'T1', resp: 'Marleide Gomes', cargo: 'TEAM LEADER', area: 'CHECKING LEVE', idle: '0'},
            {data: '12/05/2026 20:04:03', cd: 'NOVA SANTA RITA', turno: 'T2', resp: 'Daniele Geringer Belmonte', cargo: 'SUPERVISOR', area: 'PICKING LEVE', idle: '0'},
            {data: '12/05/2026 20:22:50', cd: 'HIDROLÂNDIA', turno: 'T2', resp: 'Tamiles Oliveira de Santana', cargo: 'TEAM LEADER', area: 'INBOUND', idle: '0'},
            {data: '12/05/2026 20:34:06', cd: 'NOVA SANTA RITA', turno: 'T2', resp: 'LEONARDO OLIVEIRA FERNANDES', cargo: 'SUPERVISOR', area: 'INBOUND', idle: '0'},
            {data: '12/05/2026 23:15:25', cd: 'JABOATÃO', turno: 'T2', resp: 'Pedro Aurélio', cargo: 'SUPERVISOR', area: 'INVENTARIO', idle: '0'},
            {data: '12/05/2026 23:42:44', cd: 'JABOATÃO', turno: 'T2', resp: 'Guilherme Cruz', cargo: 'SUPERVISOR', area: 'QUALIDADE', idle: '0'},
            {data: '13/05/2026 06:51:21', cd: 'FRANCO 1', turno: 'T1', resp: 'CESAR TERENZI', cargo: 'SUPERVISOR', area: 'SHIPPING', idle: '0'},
            {data: '13/05/2026 07:46:18', cd: 'FRANCO 1', turno: 'T3', resp: 'Maicon Luiz Miranda do Prado', cargo: 'SUPERVISOR TURNO', area: 'PICKING LEVE', idle: '0'},
            {data: '13/05/2026 07:50:06', cd: 'FRANCO 1', turno: 'T3', resp: 'Joyce Barros Souza', cargo: 'SUPERVISOR TURNO', area: 'PICKING LEVE', idle: '0'}
        ];

        function engine() {
            const tbody = document.getElementById('table-body');
            document.getElementById('counter').innerText = `${DATA_REAIS.length} REGISTROS CARREGADOS`;

            tbody.innerHTML = DATA_REAIS.map(row => `
                <tr>
                    <td class="time-cell">${row.data}</td>
                    <td><b>${row.turno}</b></td>
                    <td><b>${row.cd}</b></td>
                    <td>${row.resp}</td>
                    <td style="color: var(--text-dim)">${row.cargo}</td>
                    <td><span class="area-badge">${row.area}</span></td>
                    <td><span class="idle-tag">${row.idle} MIN</span></td>
                </tr>
            `).join('');

            charts();
        }

        function charts() {
            const count = (key) => {
                const map = {};
                DATA_REAIS.forEach(r => map[r[key]] = (map[r[key]] || 0) + 1);
                return { labels: Object.keys(map), data: Object.values(map) };
            };

            const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };

            const t = count('turno');
            new Chart(document.getElementById('cTurno'), {
                type: 'bar', data: { labels: t.labels, datasets: [{ data: t.data, backgroundColor: '#ee4d2d' }] }, options: opt
            });

            const c = count('cd');
            new Chart(document.getElementById('cCD'), {
                type: 'bar', data: { labels: c.labels, datasets: [{ data: c.data, backgroundColor: '#2f81f7' }] }, options: opt
            });

            const a = count('area');
            new Chart(document.getElementById('cArea'), {
                type: 'doughnut', data: { labels: a.labels, datasets: [{ data: a.data, backgroundColor: ['#ee4d2d', '#2f81f7', '#3fb950', '#f1e05a', '#8b949e'] }] }, 
                options: { ...opt, cutout: '70%' }
            });
        }

        window.onload = engine;
    </script>
</body>
</html>
