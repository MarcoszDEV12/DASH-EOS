<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS-BR | ENTERPRISE MONITORING</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        :root {
            /* Sua paleta de cores personalizada: Marrom, Bege e Branco */
            --brand-primary: #8B4513; 
            --brand-secondary: #D2B48C;
            --bg-main: #0a0908;
            --bg-surface: #1a1714;
            --bg-elevated: #26221f;
            --border-thin: #3d352e;
            --text-primary: #f8f5f2;
            --text-secondary: #a89f94;
            --accent-urban: #e6edf3;
            --success: #588157;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg-main); color: var(--text-primary); font-family: var(--font-sans); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: rgba(26, 23, 20, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-thin); padding: 12px 30px; z-index: 100; }
        .nav-container { max-width: 1920px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .brand h1 { font-size: 14px; font-weight: 700; letter-spacing: 2px; }
        .brand span { color: var(--brand-secondary); }

        .controls { display: flex; gap: 8px; flex: 1; justify-content: center; max-width: 950px; }
        .control-item { background: var(--bg-elevated); border: 1px solid var(--border-thin); color: var(--text-primary); padding: 6px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .control-item:hover { border-color: var(--brand-secondary); }

        .search-wrapper { position: relative; width: 250px; }
        .search-wrapper i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--text-secondary); }
        .search-input { width: 100%; padding-left: 30px !important; }

        .main-content { flex: 1; padding: 20px 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        @media (max-width: 1300px) { .dashboard-grid { grid-template-columns: repeat(2, 1fr); } }

        .card { background: var(--bg-surface); border: 1px solid var(--border-thin); border-radius: 6px; padding: 16px; }
        .card-title { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 15px; display: block; }
        .chart-box { height: 180px; width: 100%; }

        .data-section { background: var(--bg-surface); border: 1px solid var(--border-thin); border-radius: 6px; flex: 1; display: flex; flex-direction: column; min-height: 400px; }
        .table-header-tool { padding: 12px 20px; border-bottom: 1px solid var(--border-thin); display: flex; justify-content: space-between; align-items: center; }
        
        .btn-export { background: transparent; border: 1px solid var(--brand-secondary); color: var(--brand-secondary); padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-export:hover { background: var(--brand-secondary); color: var(--bg-main); }

        .table-wrapper { overflow: auto; flex: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        thead th { position: sticky; top: 0; background: var(--bg-elevated); text-align: left; padding: 12px 20px; color: var(--text-secondary); font-size: 10px; border-bottom: 1px solid var(--border-thin); z-index: 5; }
        tbody tr:hover { background: rgba(210, 180, 140, 0.05); }
        tbody td { padding: 10px 20px; border-bottom: 1px solid rgba(61, 53, 46, 0.5); }

        .mono { font-family: var(--font-mono); color: var(--brand-secondary); }
        .tag { padding: 2px 8px; background: var(--bg-elevated); border: 1px solid var(--border-thin); border-radius: 3px; font-size: 10px; color: var(--accent-urban); }
        .status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--success); }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="brand">
                <h1>EOS<span>BR</span> <small style="font-weight: 300; opacity: 0.5;">v4.0.2</small></h1>
            </div>
            
            <div class="controls">
                <select id="f-turno" class="control-item" onchange="App.filter()">
                    <option value="">ALL SHIFTS</option>
                    <option>T1</option><option>T2</option><option>T3</option>
                </select>

                <select id="f-cd" class="control-item" onchange="App.filter()">
                    <option value="">ALL HUBS</option>
                </select>

                <select id="f-cargo" class="control-item" onchange="App.filter()">
                    <option value="">ALL ROLES</option>
                </select>

                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="f-search" class="control-item search-input" placeholder="Search operational lead..." onkeyup="App.filter()">
                </div>
            </div>

            <div style="font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary);">
                <span class="status-dot"></span> <span id="clock">00:00:00</span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="dashboard-grid">
            <div class="card"><span class="card-title">Shift Performance</span><div class="chart-box"><canvas id="chartTurno"></canvas></div></div>
            <div class="card"><span class="card-title">Regional Distribution</span><div class="chart-box"><canvas id="chartCD"></canvas></div></div>
            <div class="card"><span class="card-title">Leadership Ratio</span><div class="chart-box"><canvas id="chartCargo"></canvas></div></div>
            <div class="card"><span class="card-title">Area Utilization</span><div class="chart-box"><canvas id="chartArea"></canvas></div></div>
        </div>

        <div class="data-section">
            <div class="table-header-tool">
                <span style="font-size: 10px; font-weight: 700; color: var(--text-secondary);">REAL-TIME LOGBOOK <span id="reg-count" style="margin-left:10px; color:var(--brand-secondary)">-</span></span>
                <button class="btn-export" onclick="App.exportCSV()"><i class="fas fa-download"></i> EXPORT CSV</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Timestamp</th><th>Shift</th><th>Hub</th><th>Lead</th><th>Role</th><th>Area</th>
                        </tr>
                    </thead>
                    <tbody id="main-table"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        Chart.register(ChartDataLabels);

        const App = {
            database: [
                {data: '12/05/2026 15:37:16', turno: 'T1', cd: 'Jaboatão', resp: 'Guioberto', cargo: 'Supervisor', area: 'Checking Leve'},
                {data: '12/05/2026 16:05:44', turno: 'T1', cd: 'Franco 1', resp: 'Giovane Torre', cargo: 'Supervisor Turno', area: 'Checking Leve'},
                {data: '12/05/2026 19:28:19', turno: 'T1', cd: 'Hidrolândia', resp: 'Marleide Gomes', cargo: 'Team Leader', area: 'Checking Leve'},
                {data: '12/05/2026 20:04:03', turno: 'T2', cd: 'Nova Santa Rita', resp: 'Daniele Geringer', cargo: 'Supervisor', area: 'Picking Leve'},
                {data: '12/05/2026 20:22:50', turno: 'T2', cd: 'Hidrolândia', resp: 'Tamiles Oliveira', cargo: 'Team Leader', area: 'Inbound'},
                {data: '12/05/2026 20:34:06', turno: 'T2', cd: 'Nova Santa Rita', resp: 'Leonardo Oliveira', cargo: 'Supervisor', area: 'Inbound'},
                {data: '13/05/2026 06:51:21', turno: 'T1', cd: 'Franco 1', resp: 'Cezar Terenzi', cargo: 'Supervisor', area: 'Shipping'},
                {data: '13/05/2026 07:50:06', turno: 'T3', cd: 'Franco 1', resp: 'Joyce Barros', cargo: 'Supervisor Turno', area: 'Picking Leve'}
            ],
            charts: {},

            init() {
                this.populateDynamicFilters();
                this.setupCharts();
                this.filter();
                setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'), 1000);
            },

            populateDynamicFilters() {
                const cds = [...new Set(this.database.map(i => i.cd))];
                const cargos = [...new Set(this.database.map(i => i.cargo))];
                
                document.getElementById('f-cd').innerHTML += cds.map(c => `<option>${c}</option>`).join('');
                document.getElementById('f-cargo').innerHTML += cargos.map(c => `<option>${c}</option>`).join('');
            },

            setupCharts() {
                const commonOptions = {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        datalabels: { color: '#a89f94', anchor: 'end', align: 'top', font: { family: 'JetBrains Mono', size: 10 } }
                    },
                    scales: {
                        y: { grid: { color: '#3d352e' }, ticks: { display: false } },
                        x: { grid: { display: false }, ticks: { color: '#a89f94', font: { size: 9 } } }
                    }
                };

                const ctxs = ['chartTurno', 'chartCD', 'chartCargo'];
                const colors = ['#8B4513', '#D2B48C', '#588157'];

                ctxs.forEach((id, i) => {
                    this.charts[id.replace('chart', '').toLowerCase()] = new Chart(document.getElementById(id), {
                        type: 'bar',
                        data: { labels: [], datasets: [{ backgroundColor: colors[i], data: [], borderRadius: 4, barThickness: 25 }] },
                        options: commonOptions
                    });
                });

                this.charts.area = new Chart(document.getElementById('chartArea'), {
                    type: 'doughnut',
                    data: { labels: [], datasets: [{ backgroundColor: ['#8B4513', '#D2B48C', '#588157', '#3d352e'], data: [], borderWidth: 0 }] },
                    options: { cutout: '75%', plugins: { legend: { display: false }, datalabels: { display: false } } }
                });
            },

            filter() {
                const t = document.getElementById('f-turno').value;
                const c = document.getElementById('f-cd').value;
                const g = document.getElementById('f-cargo').value;
                const s = document.getElementById('f-search').value.toLowerCase();

                const filtered = this.database.filter(i => 
                    (!t || i.turno === t) && (!c || i.cd === c) && 
                    (!g || i.cargo === g) && (i.resp.toLowerCase().includes(s))
                );

                this.renderTable(filtered);
                this.updateCharts(filtered);
            },

            renderTable(data) {
                document.getElementById('reg-count').innerText = `${data.length} UNITS`;
                document.getElementById('main-table').innerHTML = data.map(r => `
                    <tr>
                        <td class="mono">${r.data}</td>
                        <td style="font-weight:700">${r.turno}</td>
                        <td>${r.cd}</td>
                        <td style="font-weight:500">${r.resp}</td>
                        <td style="color:var(--text-secondary)">${r.cargo}</td>
                        <td><span class="tag">${r.area}</span></td>
                    </tr>
                `).join('');
            },

            updateCharts(data) {
                const keys = ['turno', 'cd', 'cargo', 'area'];
                keys.forEach(key => {
                    const counts = {};
                    data.forEach(i => counts[i[key]] = (counts[i[key]] || 0) + 1);
                    const chart = this.charts[key];
                    chart.data.labels = Object.keys(counts);
                    chart.data.datasets[0].data = Object.values(counts);
                    chart.update();
                });
            },

            exportCSV() {
                const headers = ["Data", "Turno", "CD", "Responsavel", "Cargo", "Area"];
                const content = [headers.join(",")];
                this.database.forEach(i => content.push(`${i.data},${i.turno},${i.cd},${i.resp},${i.cargo},${i.area}`));
                
                const blob = new Blob([content.join("\n")], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `EOS_Export_${new Date().getTime()}.csv`;
                a.click();
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
