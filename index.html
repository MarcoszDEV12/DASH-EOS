<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS-BR | NATIONAL MONITORING</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --shopee-orange: #ee4d2d;
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- FILTROS SUPERIORES (ESTILO DASHBOARD DE COMANDO) --- */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 15px 40px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .hud-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr) 2fr;
            gap: 12px;
            align-items: center;
        }

        .hud-item select, .hud-search input {
            width: 100%;
            background: #161b22;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 13px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hud-item select:hover { border-color: var(--shopee-orange); box-shadow: 0 0 10px rgba(238, 77, 45, 0.2); }

        .hud-search { position: relative; }
        .hud-search i { position: absolute; right: 15px; top: 14px; color: var(--shopee-orange); }

        /* --- DASHBOARD CONTENT --- */
        .viewport {
            flex: 1;
            padding: 20px 40px;
            overflow-y: auto;
            background: radial-gradient(circle at 50% -20%, rgba(238, 77, 45, 0.08), transparent);
        }

        .analytics-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .card-glass {
            background: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            height: 300px;
        }

        .card-glass h3 {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-glass h3 i { color: var(--shopee-orange); }

        /* --- TABELA DE ALTA PERFORMANCE --- */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .table-info {
            padding: 20px 25px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .counter-badge {
            background: var(--shopee-orange);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
        }

        .scroll-area { max-height: 600px; overflow-y: auto; }

        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { 
            position: sticky; top: 0; 
            background: #010409; 
            padding: 15px 25px; 
            font-size: 11px; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            z-index: 10;
        }
        td { padding: 15px 25px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:hover { background: rgba(255,255,255,0.02); }

        /* DADOS ESTILIZADOS */
        .idle-alert {
            font-family: var(--font-code);
            color: #ff7b72;
            background: rgba(248, 81, 73, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(248, 81, 73, 0.2);
        }

        .tag-area {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(47, 129, 247, 0.1);
            color: #58a6ff;
        }

        .time-stamp { color: var(--shopee-orange); font-family: var(--font-code); font-weight: 600; }
        .row-cd { font-weight: 800; color: #f0f6fc; }
    </style>
</head>
<body>

    <header>
        <div class="hud-grid">
            <div class="hud-item"><select id="m-mes"><option>MAIO 2026</option></select></div>
            <div class="hud-item">
                <select id="m-turno">
                    <option value="">TODOS TURNOS</option>
                    <option>T1</option><option>T2</option><option>T3</option><option>T4</option>
                </select>
            </div>
            <div class="hud-item">
                <select id="m-cargo">
                    <option value="">TODOS CARGOS</option>
                    <option>Team Leader</option><option>Supervisor</option><option>Coordenador</option>
                </select>
            </div>
            <div class="hud-item">
                <select id="m-cd">
                    <option value="">TODOS CDs</option>
                    <option>Jaboatão</option><option>Franco 1</option><option>Hidrolândia</option>
                </select>
            </div>
            <div class="hud-search">
                <input type="text" placeholder="BUSCAR POR RESPONSÁVEL OU ID...">
                <i class="fas fa-bullseye"></i>
            </div>
        </div>
    </header>

    <main class="viewport">
        <div class="analytics-row">
            <div class="card-glass">
                <h3><i class="fas fa-chart-bar"></i> Volume por Turno</h3>
                <div style="height: 230px;"><canvas id="cTurno"></canvas></div>
            </div>
            <div class="card-glass">
                <h3><i class="fas fa-warehouse"></i> Registros por Unidade</h3>
                <div style="height: 230px;"><canvas id="cCD"></canvas></div>
            </div>
            <div class="card-glass">
                <h3><i class="fas fa-th-large"></i> Fluxo de Área</h3>
                <div style="height: 230px;"><canvas id="cArea"></canvas></div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-info">
                <div style="font-weight: 800; letter-spacing: 1px;">MONITORAMENTO NACIONAL EOS-BR</div>
                <div class="counter-badge" id="row-count">690 REGISTROS</div>
            </div>
            <div class="scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th>CARIMBO DATA/HORA</th>
                            <th>TURNO</th>
                            <th>CD</th>
                            <th>RESPONSÁVEL</th>
                            <th>CARGO</th>
                            <th>ÁREA</th>
                            <th>IDLE (MIN)</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body">
                        <!-- Gerado via script para performance -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // --- MOTOR DE DADOS DE ALTA VOLUMETRIA ---
        const RAW_DATA = []; // Aqui entrariam as 690 linhas
        
        // Simulação rápida para visualização
        const cds = ['Jaboatão', 'Franco 1', 'Franco 2', 'Hidrolândia', 'Contagem'];
        const areas = ['Inbound', 'Picking Leve', 'Picking Vol', 'Shipping', 'Qualidade'];
        const cargos = ['Team Leader', 'Supervisor', 'Coordenador', 'Analista'];

        for(let i=0; i<690; i++) {
            RAW_DATA.push({
                data: `13/05/26 12:${(i%60).toString().padStart(2, '0')}`,
                turno: `T${(i % 4) + 1}`,
                cd: cds[Math.floor(Math.random() * cds.length)],
                resp: `Colaborador EOS ${i+100}`,
                cargo: cargos[Math.floor(Math.random() * cargos.length)],
                area: areas[Math.floor(Math.random() * areas.length)],
                idle: Math.floor(Math.random() * 45)
            });
        }

        function renderEngine() {
            const tbody = document.getElementById('main-table-body');
            tbody.innerHTML = RAW_DATA.map(row => `
                <tr>
                    <td class="time-stamp">${row.data}</td>
                    <td><b>${row.turno}</b></td>
                    <td class="row-cd">${row.cd}</td>
                    <td>${row.resp}</td>
                    <td style="color: var(--text-dim)">${row.cargo}</td>
                    <td><span class="tag-area">${row.area}</span></td>
                    <td><span class="idle-alert">${row.idle} MIN</span></td>
                </tr>
            `).join('');

            initCharts();
        }

        function initCharts() {
            const config = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#161b22' }, ticks: { color: '#8b949e', font: { family: 'JetBrains Mono', size: 10 } } },
                    x: { grid: { display: false }, ticks: { color: '#8b949e', font: { family: 'JetBrains Mono', size: 10 } } }
                }
            };

            new Chart(document.getElementById('cTurno'), {
                type: 'bar',
                data: { labels: ['T1', 'T2', 'T3', 'T4'], datasets: [{ data: [180, 240, 150, 120], backgroundColor: '#ee4d2d' }]},
                options: config
            });

            new Chart(document.getElementById('cCD'), {
                type: 'bar',
                data: { labels: ['JAB', 'FRA1', 'FRA2', 'HID', 'CON'], datasets: [{ data: [200, 150, 100, 140, 100], backgroundColor: '#58a6ff' }]},
                options: config
            });

            new Chart(document.getElementById('cArea'), {
                type: 'doughnut',
                data: { 
                    labels: ['Inbound', 'Picking', 'Shipping', 'Outros'], 
                    datasets: [{ data: [30, 40, 20, 10], backgroundColor: ['#ee4d2d', '#58a6ff', '#238636', '#8b949e'], borderWidth: 0 }]
                },
                options: { ...config, cutout: '80%' }
            });
        }

        window.onload = renderEngine;
    </script>
</body>
</html>
