<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee EOS BR | Operational Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --shopee-orange: #EE4D2D;
            --bg-deep: #05070A;
            --bg-card: #0D1117;
            --bg-hover: #161B22;
            --border: #30363D;
            --text-main: #F0F6FC;
            --text-dim: #8B949E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; overflow-x: hidden; }

        /* Sidebar - Referência image_1cb9fb.png */
        aside { width: 260px; height: 100vh; background: var(--bg-card); border-right: 1px solid var(--border); padding: 25px; position: fixed; display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: 800; margin-bottom: 40px; color: var(--text-main); }
        .logo span { color: var(--shopee-orange); }
        
        nav ul { list-style: none; }
        nav li {
            padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; cursor: pointer;
            transition: 0.3s; color: var(--text-dim); display: flex; align-items: center; gap: 12px;
            position: relative; font-weight: 500;
        }
        nav li i { width: 20px; font-size: 18px; }
        nav li:hover { background: var(--bg-hover); color: var(--text-main); }
        
        nav li.active { background: #161B22; color: var(--shopee-orange); }
        nav li.active::before {
            content: ""; position: absolute; left: -2px; top: 20%; height: 60%; width: 3px;
            background: var(--shopee-orange); box-shadow: 0 0 10px var(--shopee-orange); border-radius: 4px;
        }
        .nav-footer { margin-top: auto; }

        main { flex: 1; margin-left: 260px; padding: 30px; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-search { display: flex; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 18px; width: 400px; }
        .header-search input { background: transparent; border: none; color: white; margin-left: 12px; width: 100%; font-size: 14px; }

        /* Filtros Baseados nas imagens 1cb981, 1cb962, 1cb6b6, 1cb695 */
        .filter-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        select { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 10px; cursor: pointer; appearance: none; }

        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
        .kpi-card .label { color: var(--text-dim); font-size: 12px; display: block; margin-bottom: 5px; }
        .kpi-card .value { font-size: 24px; font-weight: 800; color: var(--shopee-orange); }

        .charts-section { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; margin-bottom: 30px; }
        .chart-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; height: 350px; }
        .chart-box h3 { font-size: 14px; margin-bottom: 20px; color: var(--text-dim); }

        .table-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 15px; color: var(--text-dim); border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .badge-area { background: rgba(238, 77, 45, 0.1); color: var(--shopee-orange); padding: 4px 10px; border-radius: 6px; font-weight: 600; font-size: 11px; }

        #loading { position: fixed; inset: 0; background: var(--bg-deep); z-index: 2000; display: flex; justify-content: center; align-items: center; transition: 0.5s; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--shopee-orange); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading"><div class="spinner"></div></div>

    <aside>
        <div class="logo">SHOPEE <span>EOS</span></div>
        <nav>
            <ul>
                <li class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</li>
                <li><i class="fa-solid fa-box-open"></i> Operações</li>
                <li><i class="fa-solid fa-truck-ramp-box"></i> Logística</li>
                <li><i class="fa-solid fa-user-group"></i> Equipe</li>
            </ul>
        </nav>
        <div class="nav-footer">
            <nav><ul><li><i class="fa-solid fa-gear"></i> Configurações</li></ul></nav>
        </div>
    </aside>

    <main>
        <header>
            <div>
                <h1 style="font-size: 24px;">Visão Operacional</h1>
                <p id="date-display" style="color: var(--text-dim); font-size: 13px;"></p>
            </div>
            <div class="header-search">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="search" placeholder="Pesquisar responsável ou cargo..." onkeyup="Dashboard.update()">
            </div>
        </header>

        <div class="filter-bar">
            <div class="filter-group">
                <label>Centro de Distribuição</label>
                <select id="f-cd" onchange="Dashboard.update()"><option value="">Todos</option></select>
            </div>
            <div class="filter-group">
                <label>Turno</label>
                <select id="f-turno" onchange="Dashboard.update()"><option value="">Todos</option></select>
            </div>
            <div class="filter-group">
                <label>Cargo</label>
                <select id="f-cargo" onchange="Dashboard.update()"><option value="">Todos</option></select>
            </div>
            <div class="filter-group">
                <label>Área</label>
                <select id="f-area" onchange="Dashboard.update()"><option value="">Todas</option></select>
            </div>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card"><span class="label">Total de Envios</span><span class="value" id="k-total">0</span></div>
            <div class="kpi-card"><span class="label">CD mais Ativo</span><span class="value" id="k-cd">-</span></div>
            <div class="kpi-card"><span class="label">Turno Pico</span><span class="value" id="k-turno">-</span></div>
            <div class="kpi-card"><span class="label">Área Crítica</span><span class="value" id="k-area">-</span></div>
        </div>

        <div class="charts-section">
            <div class="chart-box"><h3>Performance por Unidade</h3><canvas id="mainChart"></canvas></div>
            <div class="chart-box"><h3>Mix de Áreas</h3><canvas id="pieChart"></canvas></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Horário</th>
                        <th>CD</th>
                        <th>Turno</th>
                        <th>Responsável</th>
                        <th>Cargo</th>
                        <th>Área</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </main>

    <script>
        const Dashboard = {
            // Dados estáticos extraídos das imagens fornecidas
            data: [
                {ts: "13/05/2026 14:20", cd: "Jaboatão", turno: "T1", resp: "MARCOS PAULO", cargo: "SUPERVISOR", area: "CHECKING LEVE"},
                {ts: "13/05/2026 13:45", cd: "Franco 1", turno: "T2", resp: "RICARDO ALVES", cargo: "TEAM LEADER", area: "INBOUND"},
                {ts: "13/05/2026 12:10", cd: "Franco 2", turno: "T3", resp: "ANA CLARA", cargo: "COORDENADOR", area: "PICKING LEVE"},
                {ts: "13/05/2026 11:30", cd: "Contagem", turno: "T4", resp: "BRUNO SILVA", cargo: "PS", area: "SHIPPING"},
                {ts: "13/05/2026 10:15", cd: "Nova Santa Rita", turno: "T5", resp: "CARLA DIAS", cargo: "SUPERVISOR TURNO", area: "INVENTÁRIO"},
                {ts: "13/05/2026 09:00", cd: "Hidrolândia", turno: "T6", resp: "FELIPE MELO", cargo: "SUPERVISOR MWH", area: "QUALIDADE"},
                {ts: "13/05/2026 08:20", cd: "Jaboatão", turno: "T7", resp: "ELIAS COSTA", cargo: "SUPERVISOR", area: "IBT"},
                {ts: "12/05/2026 23:50", cd: "Franco 1", turno: "T1", resp: "GIOVANE TORRE", cargo: "SUPERVISOR TURNO", area: "CHECKING VOL"},
                {ts: "12/05/2026 22:15", cd: "Franco 2", turno: "T2", resp: "MAICON LUIZ", cargo: "TEAM LEADER", area: "PICKING VOL"}
            ],
            
            // Listas extraídas das imagens
            filters: {
                cds: ["Jaboatão", "Franco 1", "Franco 2", "Contagem", "Nova Santa Rita", "Hidrolândia"],
                cargos: ["TEAM LEADER", "COORDENADOR", "PS", "SUPERVISOR", "SUPERVISOR TURNO", "SUPERVISOR MWH"],
                turnos: ["T1", "T2", "T3", "T4", "T5", "T6", "T7"],
                areas: ["INBOUND", "PICKING LEVE", "PICKING VOL", "CHECKING LEVE", "CHECKING VOL", "SHIPPING", "INVENTÁRIO", "IBT", "QUALIDADE"]
            },

            charts: {},

            init() {
                this.setupFilters();
                this.initCharts();
                this.update();
                document.getElementById('date-display').innerText = new Date().toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                setTimeout(() => document.getElementById('loading').style.opacity = '0', 600);
                setTimeout(() => document.getElementById('loading').style.display = 'none', 1100);
            },

            setupFilters() {
                const fill = (id, list) => {
                    const el = document.getElementById(id);
                    list.forEach(item => el.innerHTML += `<option value="${item}">${item}</option>`);
                };
                fill('f-cd', this.filters.cds);
                fill('f-cargo', this.filters.cargos);
                fill('f-turno', this.filters.turnos);
                fill('f-area', this.filters.areas);
            },

            update() {
                const search = document.getElementById('search').value.toLowerCase();
                const fCd = document.getElementById('f-cd').value;
                const fCargo = document.getElementById('f-cargo').value;
                const fTurno = document.getElementById('f-turno').value;
                const fArea = document.getElementById('f-area').value;

                const filtered = this.data.filter(i => {
                    return (!fCd || i.cd === fCd) &&
                           (!fCargo || i.cargo === fCargo) &&
                           (!fTurno || i.turno === fTurno) &&
                           (!fArea || i.area === fArea) &&
                           (i.resp.toLowerCase().includes(search) || i.cargo.toLowerCase().includes(search));
                });

                this.renderTable(filtered);
                this.updateKPIs(filtered);
                this.updateCharts(filtered);
            },

            updateKPIs(data) {
                document.getElementById('k-total').innerText = data.length;
                if(data.length > 0) {
                    document.getElementById('k-cd').innerText = this.mode(data, 'cd');
                    document.getElementById('k-turno').innerText = this.mode(data, 'turno');
                    document.getElementById('k-area').innerText = this.mode(data, 'area');
                }
            },

            mode(arr, key) {
                const counts = {};
                arr.forEach(i => counts[i[key]] = (counts[i[key]] || 0) + 1);
                return Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            },

            renderTable(data) {
                const body = document.getElementById('table-body');
                body.innerHTML = data.map(row => `
                    <tr>
                        <td style="color:var(--text-dim); font-family:'JetBrains Mono'">${row.ts}</td>
                        <td><b>${row.cd}</b></td>
                        <td>${row.turno}</td>
                        <td>${row.resp}</td>
                        <td style="color:var(--text-dim)">${row.cargo}</td>
                        <td><span class="badge-area">${row.area}</span></td>
                    </tr>
                `).join('');
            },

            initCharts() {
                const ctxMain = document.getElementById('mainChart').getContext('2d');
                this.charts.main = new Chart(ctxMain, {
                    type: 'bar',
                    data: { labels: [], datasets: [{ label: 'Registros', backgroundColor: '#EE4D2D', borderRadius: 5, data: [] }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#30363D' } } } }
                });

                const ctxPie = document.getElementById('pieChart').getContext('2d');
                this.charts.pie = new Chart(ctxPie, {
                    type: 'doughnut',
                    data: { labels: [], datasets: [{ backgroundColor: ['#EE4D2D', '#FF8A65', '#BF360C', '#FFAB91', '#D84315'], data: [] }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#8B949E', boxWidth: 10, font: { size: 10 } } } } }
                });
            },

            updateCharts(data) {
                const cdCounts = {};
                data.forEach(i => cdCounts[i.cd] = (cdCounts[i.cd] || 0) + 1);
                this.charts.main.data.labels = Object.keys(cdCounts);
                this.charts.main.data.datasets[0].data = Object.values(cdCounts);
                this.charts.main.update();

                const areaCounts = {};
                data.forEach(i => areaCounts[i.area] = (areaCounts[i.area] || 0) + 1);
                this.charts.pie.data.labels = Object.keys(areaCounts);
                this.charts.pie.data.datasets[0].data = Object.values(areaCounts);
                this.charts.pie.update();
            }
        };

        window.onload = () => Dashboard.init();
    </script>
</body>
</html>
