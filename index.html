<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS-BR | COMMAND CENTER</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        :root {
            /* Paleta Marcos Paulo: Urban Tactical */
            --primary: #8B4513;    /* Marrom Saddle */
            --secondary: #D2B48C;  /* Tan/Bege */
            --bg-deep: #0D0C0B;    /* Preto levemente quente */
            --bg-card: #1A1816;    /* Marrom ultra escuro */
            --border: #2D2926;     /* Cinza terroso */
            --text: #F2EFE9;       /* Branco "Bone" */
            --text-dim: #8C857E;   /* Bege acinzentado */
            --accent: #E6EDF3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--text); 
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER PREMIUM */
        header { 
            background: linear-gradient(to right, #1A1816, #0D0C0B);
            border-bottom: 2px solid var(--primary);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area h1 { 
            font-size: 18px; 
            letter-spacing: 4px; 
            font-weight: 800;
            color: var(--text);
        }

        .logo-area span { color: var(--primary); }

        /* KPI TOP BAR */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px 40px 0 40px;
        }

        .kpi-card {
            background: var(--bg-card);
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 4px;
        }

        .kpi-label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
        .kpi-value { font-family: 'JetBrains Mono'; font-size: 22px; font-weight: 700; margin-top: 5px; }

        /* MAIN CONTENT */
        .viewport {
            flex: 1;
            padding: 20px 40px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            overflow: hidden;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--secondary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-container { flex: 1; min-height: 150px; }

        /* SIDE LOGBOOK */
        .logbook {
            display: flex;
            flex-direction: column;
        }

        .log-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .log-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .log-item:hover { border-color: var(--secondary); background: rgba(210, 180, 140, 0.05); }

        .log-time { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--primary); }
        .log-user { font-weight: 600; font-size: 13px; margin: 4px 0; }
        .log-meta { font-size: 11px; color: var(--text-dim); }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 700;
            background: var(--border);
            color: var(--secondary);
            margin-top: 5px;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .filter-pill {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 11px;
            outline: none;
            cursor: pointer;
        }

        .filter-pill:focus { border-color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>EOS<span>BR</span> <small style="font-weight: 300; opacity: 0.4; letter-spacing: 0;">TAC-COMMAND</small></h1>
        </div>
        
        <div style="display: flex; gap: 10px;">
            <select class="filter-pill" id="f-cd" onchange="App.update()"><option value="">TODOS OS HUBS</option></select>
            <select class="filter-pill" id="f-turno" onchange="App.update()">
                <option value="">TURNOS</option>
                <option>T1</option><option>T2</option><option>T3</option>
            </select>
            <div id="clock" style="font-family: 'JetBrains Mono'; color: var(--secondary); font-weight: 700; margin-left: 20px;">15:18:25</div>
        </div>
    </header>

    <div class="kpi-row">
        <div class="kpi-card"><div class="kpi-label">Total Logs</div><div class="kpi-value" id="kpi-total">0</div></div>
        <div class="kpi-card"><div class="kpi-label">Lead Operacional</div><div class="kpi-value" id="kpi-lead" style="font-size: 16px;">-</div></div>
        <div class="kpi-card"><div class="kpi-label">CD Mais Ativo</div><div class="kpi-value" id="kpi-active-cd" style="font-size: 16px;">-</div></div>
        <div class="kpi-card"><div class="kpi-label">Área Crítica</div><div class="kpi-value" id="kpi-area" style="font-size: 16px;">-</div></div>
    </div>

    <main class="viewport">
        <div class="charts-grid">
            <div class="panel">
                <div class="panel-header"><i class="fas fa-layer-group"></i> Volume por CD</div>
                <div class="chart-container"><canvas id="chartCD"></canvas></div>
            </div>
            <div class="panel">
                <div class="panel-header"><i class="fas fa-clock"></i> Performance Turno</div>
                <div class="chart-container"><canvas id="chartTurno"></canvas></div>
            </div>
            <div class="panel">
                <div class="panel-header"><i class="fas fa-user-shield"></i> Liderança</div>
                <div class="chart-container"><canvas id="chartCargo"></canvas></div>
            </div>
            <div class="panel">
                <div class="panel-header"><i class="fas fa-chart-pie"></i> Ocupação Área</div>
                <div class="chart-container"><canvas id="chartArea"></canvas></div>
            </div>
        </div>

        <aside class="panel logbook">
            <div class="panel-header"><i class="fas fa-list-ul"></i> Live Feed</div>
            <div class="log-list" id="feed">
                <!-- Logs via JS -->
            </div>
        </aside>
    </main>

    <script>
        const App = {
            data: [
                {data: '12/05/26 15:37', turno: 'T1', cd: 'Jaboatão', resp: 'Guioberto', cargo: 'Supervisor', area: 'Checking Leve'},
                {data: '12/05/26 16:05', turno: 'T1', cd: 'Franco 1', resp: 'Giovane Torre', cargo: 'Supervisor Turno', area: 'Checking Leve'},
                {data: '12/05/26 19:28', turno: 'T1', cd: 'Hidrolândia', resp: 'Marleide Gomes', cargo: 'Team Leader', area: 'Inbound'},
                {data: '12/05/26 20:04', turno: 'T2', cd: 'Nova Santa Rita', resp: 'Daniele Geringer', cargo: 'Supervisor', area: 'Picking Leve'},
                {data: '12/05/26 23:42', turno: 'T2', cd: 'Jaboatão', resp: 'Guilherme Cruz', cargo: 'Supervisor', area: 'Qualidade'},
                {data: '13/05/26 07:50', turno: 'T3', cd: 'Franco 1', resp: 'Joyce Barros', cargo: 'Supervisor Turno', area: 'Shipping'}
            ],
            charts: {},

            init() {
                this.setupFilters();
                this.setupCharts();
                this.update();
                setInterval(() => {
                    document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
                }, 1000);
            },

            setupFilters() {
                const cds = [...new Set(this.data.map(i => i.cd))];
                const sel = document.getElementById('f-cd');
                cds.forEach(c => sel.innerHTML += `<option>${c}</option>`);
            },

            setupCharts() {
                Chart.register(ChartDataLabels);
                const cfg = (color) => ({
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: {display: false}, datalabels: {color: '#D2B48C', font: {size: 10, weight: 'bold'}} },
                    scales: { 
                        x: { grid: {display: false}, ticks: {color: '#8C857E', font: {size: 9}} },
                        y: { display: false }
                    }
                });

                this.charts.cd = new Chart(document.getElementById('chartCD'), { type: 'bar', data: {labels: [], datasets: [{backgroundColor: '#8B4513', data: []}]}, options: cfg() });
                this.charts.turno = new Chart(document.getElementById('chartTurno'), { type: 'bar', data: {labels: [], datasets: [{backgroundColor: '#D2B48C', data: []}]}, options: cfg() });
                this.charts.cargo = new Chart(document.getElementById('chartCargo'), { type: 'bar', data: {labels: [], datasets: [{backgroundColor: '#588157', data: []}]}, options: cfg() });
                this.charts.area = new Chart(document.getElementById('chartArea'), { 
                    type: 'doughnut', 
                    data: {labels: [], datasets: [{backgroundColor: ['#8B4513', '#D2B48C', '#2D2926'], data: [], borderWidth: 0}]},
                    options: { cutout: '70%', plugins: { legend: {display: false}, datalabels: {display: false} } }
                });
            },

            update() {
                const fCd = document.getElementById('f-cd').value;
                const fT = document.getElementById('f-turno').value;

                const filtered = this.data.filter(i => (!fCd || i.cd === fCd) && (!fT || i.turno === fT));

                // Update KPIs
                document.getElementById('kpi-total').innerText = filtered.length;
                document.getElementById('kpi-lead').innerText = filtered[0]?.resp || '-';
                document.getElementById('kpi-active-cd').innerText = fCd || 'Múltiplos';
                document.getElementById('kpi-area').innerText = filtered[filtered.length-1]?.area || '-';

                // Update Feed
                document.getElementById('feed').innerHTML = filtered.map(i => `
                    <div class="log-item">
                        <div class="log-time">${i.data}</div>
                        <div class="log-user">${i.resp}</div>
                        <div class="log-meta">${i.cd} • ${i.turno} • ${i.cargo}</div>
                        <div class="badge">${i.area}</div>
                    </div>
                `).reverse().join('');

                // Update Charts
                this.updateChart(this.charts.cd, filtered, 'cd');
                this.updateChart(this.charts.turno, filtered, 'turno');
                this.updateChart(this.charts.cargo, filtered, 'cargo');
                this.updateChart(this.charts.area, filtered, 'area');
            },

            updateChart(chart, data, key) {
                const counts = {};
                data.forEach(i => counts[i[key]] = (counts[i[key]] || 0) + 1);
                chart.data.labels = Object.keys(counts);
                chart.data.datasets[0].data = Object.values(counts);
                chart.update();
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
