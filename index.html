<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS-BR | MONITORAMENTO OPERACIONAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --shopee-orange: #ee4d2d;
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- FILTROS SUPERIORES --- */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            z-index: 100;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr) 2fr;
            gap: 15px;
            align-items: center;
        }

        .filter-item select, .search-bar input {
            width: 100%;
            background: #161b22;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 13px;
            transition: 0.3s;
        }

        .filter-item select:focus, .search-bar input:focus { border-color: var(--shopee-orange); }

        .search-bar { position: relative; }
        .search-bar i { position: absolute; right: 15px; top: 14px; color: var(--text-dim); }

        /* --- DASHBOARD AREA --- */
        .main-content {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
        }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            height: 300px;
        }

        .chart-card h3 {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        /* --- HISTÓRICO TABLE --- */
        .table-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .table-head-info { padding: 20px 25px; border-bottom: 1px solid var(--border); font-weight: 800; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 25px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; background: #010409; }
        td { padding: 15px 25px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:hover { background: rgba(238, 77, 45, 0.03); }

        .idle-val { 
            font-family: 'JetBrains Mono'; 
            color: #f85149; 
            font-weight: 700;
            background: rgba(248, 81, 73, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .badge-area { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .picking { background: rgba(238, 77, 45, 0.1); color: var(--shopee-orange); }
    </style>
</head>
<body>

    <header>
        <div class="filter-grid">
            <div class="filter-item">
                <select id="filter-month"><option value="">Mês: Todos</option></select>
            </div>
            <div class="filter-item">
                <select id="filter-shift"><option value="">Turno: Todos</option></select>
            </div>
            <div class="filter-item">
                <select id="filter-role"><option value="">Cargo: Todos</option></select>
            </div>
            <div class="filter-item">
                <select id="filter-cd"><option value="">CD: Todos</option></select>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Pesquisar por responsável ou ID...">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="charts-container">
            <div class="chart-card">
                <h3>Registros por Turno <i class="fas fa-clock"></i></h3>
                <canvas id="chartTurno"></canvas>
            </div>
            <div class="chart-card">
                <h3>Registros por CD <i class="fas fa-warehouse"></i></h3>
                <canvas id="chartCD"></canvas>
            </div>
            <div class="chart-card">
                <h3>Distribuição por Área <i class="fas fa-chart-pie"></i></h3>
                <canvas id="chartArea"></canvas>
            </div>
        </div>

        <div class="table-card">
            <div class="table-head-info">Histórico Completo de Registros</div>
            <table>
                <thead>
                    <tr>
                        <th>Data e Hora</th>
                        <th>Turno</th>
                        <th>CD</th>
                        <th>Responsável</th>
                        <th>Cargo</th>
                        <th>Área</th>
                        <th>Idle (Min)</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data injection -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // Configuração do Estado e Dados da Planilha
        const EOS_ENGINE = {
            data: [
                // Exemplo de como os dados da sua planilha devem entrar aqui
                { data: '13/05 10:45', turno: 'T2', cd: 'JAB1', resp: 'Marcos Paulo', cargo: 'Líder de Fluxo', area: 'Picking', idle: '12' },
                { data: '13/05 10:30', turno: 'T2', cd: 'REC2', resp: 'Ana Silva', cargo: 'Supervisor Ops', area: 'Recebimento', idle: '0' },
                { data: '13/05 09:15', turno: 'T1', cd: 'JAB1', resp: 'Ricardo M.', cargo: 'Analista', area: 'Expedição', idle: '45' }
            ],

            init() {
                this.renderTable();
                this.initCharts();
            },

            renderTable() {
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = this.data.map(row => `
                    <tr>
                        <td>${row.data}</td>
                        <td>${row.turno}</td>
                        <td><b>${row.cd}</b></td>
                        <td>${row.resp}</td>
                        <td>${row.cargo}</td>
                        <td><span class="badge-area picking">${row.area}</span></td>
                        <td><span class="idle-val">${row.idle} min</span></td>
                    </tr>
                `).join('');
            },

            initCharts() {
                const ctxCommon = {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#161b22' }, ticks: { color: '#8b949e' } },
                        x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                    }
                };

                // Chart Turno
                new Chart(document.getElementById('chartTurno'), {
                    type: 'bar',
                    data: { labels: ['T1', 'T2', 'T3'], datasets: [{ data: [120, 190, 80], backgroundColor: '#ee4d2d' }]},
                    options: ctxCommon
                });

                // Chart CD
                new Chart(document.getElementById('chartCD'), {
                    type: 'bar',
                    data: { labels: ['JAB1', 'REC2', 'FRA1'], datasets: [{ data: [300, 250, 420], backgroundColor: '#2f81f7' }]},
                    options: ctxCommon
                });

                // Chart Area
                new Chart(document.getElementById('chartArea'), {
                    type: 'doughnut',
                    data: { 
                        labels: ['Picking', 'Receb.', 'Exped.'], 
                        datasets: [{ data: [50, 30, 20], backgroundColor: ['#ee4d2d', '#2f81f7', '#238636'], borderWidth: 0 }]
                    },
                    options: { ...ctxCommon, cutout: '70%' }
                });
            }
        };

        window.onload = () => EOS_ENGINE.init();
    </script>
</body>
</html>
