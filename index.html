<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee EOS | Dashboard Profissional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --primary: #ee4d2d; /* Laranja Shopee */
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border: #30363d;
            --accent: #238636;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text-main); padding: 25px; line-height: 1.6; }

        /* Header Estilizado */
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .header h2 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .header span { color: var(--primary); }
        .date-badge { background: var(--card-bg); padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); color: var(--text-dim); font-size: 0.85rem; }

        /* Filtros em Grid */
        .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.75rem; color: var(--text-dim); font-weight: 600; text-transform: uppercase; margin-left: 2px; }
        select { background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        select:hover { border-color: var(--primary); }

        /* KPIs com Efeito de Elevação */
        .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); transition: transform 0.2s; position: relative; overflow: hidden; }
        .card::after { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); opacity: 0.7; }
        .card span { color: var(--text-dim); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .card b { display: block; font-size: 1.8rem; margin-top: 8px; letter-spacing: -1px; }

        /* Layout de Gráficos Lado a Lado */
        .charts-container { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); height: 320px; }
        .chart-box h3 { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 20px; font-weight: 600; border-left: 3px solid var(--primary); padding-left: 10px; }

        /* Tabela Profissional */
        .table-container { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(255,255,255,0.03); padding: 15px; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        td { padding: 14px 15px; border-top: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover { background: rgba(238, 77, 45, 0.05); }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; background: rgba(238, 77, 45, 0.15); color: var(--primary); }

        @media (max-width: 900px) {
            .kpis, .charts-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h2>SHOPEE <span>EOS</span></h2>
            <p style="color: var(--text-dim); font-size: 0.8rem;">Logistics Performance Monitoring</p>
        </div>
        <div class="date-badge" id="relogio">13 de Maio de 2026</div>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label>Centro de Distribuição</label>
            <select id="f-cd" onchange="filtrar()"><option value="">Todos os CDs</option></select>
        </div>
        <div class="filter-group">
            <label>Turno Operacional</label>
            <select id="f-turno" onchange="filtrar()"><option value="">Todos os Turnos</option></select>
        </div>
        <div class="filter-group">
            <label>Área de Atuação</label>
            <select id="f-area" onchange="filtrar()"><option value="">Todas as Áreas</option></select>
        </div>
    </div>

    <div class="kpis">
        <div class="card"><span>Total de Envios</span><b id="k-total">0</b></div>
        <div class="card"><span>CD Mais Ativo</span><b id="k-cd">-</b></div>
        <div class="card"><span>Pico de Turno</span><b id="k-turno">-</b></div>
        <div class="card"><span>Área de Foco</span><b id="k-area">-</b></div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            <h3>Volume por CD</h3>
            <canvas id="chartBarra"></canvas>
        </div>
        <div class="chart-box">
            <h3>Distribuição de Áreas</h3>
            <canvas id="chartPizza"></canvas>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Horário</th>
                    <th>CD</th>
                    <th>Turno</th>
                    <th>Responsável</th>
                    <th>Área</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <script>
        const dados = [
            {h: "14:20", cd: "Jaboatão", t: "T1", r: "MARCOS PAULO", a: "CHECKING LEVE"},
            {h: "13:45", cd: "Franco 2", t: "T2", r: "ALEX LOPES", a: "INBOUND"},
            {h: "12:10", cd: "Franco 2", t: "T2", r: "ANA CLARA", a: "PICKING LEVE"},
            {h: "11:30", cd: "Contagem", t: "T4", r: "BRUNO SILVA", a: "SHIPPING"},
            {h: "10:15", cd: "N. Santa Rita", t: "T5", r: "CARLA DIAS", a: "INVENTÁRIO"},
            {h: "09:00", cd: "Hidrolândia", t: "T6", r: "FELIPE MELO", a: "QUALIDADE"},
            {h: "08:45", cd: "Jaboatão", t: "T1", r: "RICARDO G.", a: "INBOUND"}
        ];

        let grafBarra, grafPizza;

        function popularFiltros() {
            const setFilter = (id, key) => {
                const unicos = [...new Set(dados.map(d => d[key]))].sort();
                const el = document.getElementById(id);
                unicos.forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`);
            };
            setFilter('f-cd', 'cd');
            setFilter('f-turno', 't');
            setFilter('f-area', 'a');
        }

        function inicializarGraficos() {
            const config = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#8b949e', font: { family: 'Inter', size: 11 } } } }
            };

            grafBarra = new Chart(document.getElementById('chartBarra'), {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Envios', data: [], backgroundColor: '#ee4d2d', borderRadius: 6 }] },
                options: { ...config, scales: { 
                    y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                    x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                }}
            });

            grafPizza = new Chart(document.getElementById('chartPizza'), {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#ee4d2d', '#f06e53', '#fb8c74', '#30363d', '#8b949e'], borderWidth: 0 }] },
                options: { ...config, cutout: '75%' }
            });
        }

        function filtrar() {
            const f = { cd: document.getElementById('f-cd').value, t: document.getElementById('f-turno').value, a: document.getElementById('f-area').value };
            const filtrados = dados.filter(d => (!f.cd || d.cd === f.cd) && (!f.t || d.t === f.t) && (!f.a || d.a === f.a));

            document.getElementById('lista').innerHTML = filtrados.map(d => `
                <tr>
                    <td style="color: var(--text-dim)">${d.h}</td>
                    <td><strong>${d.cd}</strong></td>
                    <td>${d.t}</td>
                    <td>${d.r}</td>
                    <td><span class="status-pill">${d.a}</span></td>
                </tr>
            `).join('');

            document.getElementById('k-total').innerText = filtrados.length;
            if(filtrados.length > 0) {
                const freq = (k) => Object.entries(filtrados.reduce((a,v)=>({...a, [v[k]]:(a[v[k]]||0)+1}), {})).sort((a,b)=>b[1]-a[1])[0][0];
                document.getElementById('k-cd').innerText = freq('cd');
                document.getElementById('k-turno').innerText = freq('t');
                document.getElementById('k-area').innerText = freq('a').split(' ')[0];
            }

            const cCD = {}, cA = {};
            filtrados.forEach(d => { cCD[d.cd] = (cCD[d.cd] || 0) + 1; cA[d.a] = (cA[d.a] || 0) + 1; });
            grafBarra.data.labels = Object.keys(cCD);
            grafBarra.data.datasets[0].data = Object.values(cCD);
            grafBarra.update();
            grafPizza.data.labels = Object.keys(cA);
            grafPizza.data.datasets[0].data = Object.values(cA);
            grafPizza.update();
        }

        window.onload = () => { popularFiltros(); inicializarGraficos(); filtrar(); };
    </script>
</body>
</html>
