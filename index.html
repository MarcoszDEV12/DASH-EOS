<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS-BR | MONITORAMENTO NACIONAL</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        :root {
            --shopee-orange: #ee4d2d;
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-blue: #2f81f7;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
        }

        .hud-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .logo h1 { font-size: 22px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--shopee-orange); }

        .filter-bar {
            display: flex;
            gap: 10px;
            flex: 1;
            justify-content: center;
        }

        .filter-group select, .search-box input {
            background: #161b22;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .search-box { position: relative; width: 200px; }
        .search-box i { position: absolute; left: 10px; top: 10px; color: var(--text-dim); font-size: 12px; }
        .search-box input { padding-left: 30px; width: 100%; }

        .sys-info { color: var(--shopee-orange); font-family: var(--font-code); font-weight: bold; font-size: 14px; }

        /* --- DASHBOARD GRID --- */
        .viewport {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 15px;
            height: 320px;
            display: flex;
            flex-direction: column;
        }

        .chart-card h3 {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        /* --- TABLE --- */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .table-header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .reg-badge {
            background: rgba(238, 77, 45, 0.15);
            color: var(--shopee-orange);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
        }

        .scroll-area { max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            text-align: left;
            padding: 12px 25px;
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            background: #0d1117;
            position: sticky;
            top: 0;
        }
        tbody td { padding: 14px 25px; font-size: 13px; border-bottom: 1px solid #21262d; }
        .time-txt { color: var(--shopee-orange); font-family: var(--font-code); }
        .badge-area { background: rgba(47, 129, 247, 0.1); color: var(--accent-blue); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }

    </style>
</head>
<body>

    <header>
        <div class="hud-wrapper">
            <div class="logo"><h1>EOS<span>BR</span> MONITOR</h1></div>
            <div class="filter-bar">
                <select id="f-mes"><option>MAIO 2026</option></select>
                <select id="f-turno" onchange="App.filter()"><option value="">TURNOS (TODOS)</option><option>T1</option><option>T2</option><option>T3</option></select>
                <select id="f-cd" onchange="App.filter()"><option value="">CDs (TODOS)</option><option>Jaboatão</option><option>Franco 1</option><option>Hidrolândia</option><option>Nova Santa Rita</option></select>
                <select id="f-cargo" onchange="App.filter()"><option value="">CARGOS (TODOS)</option><option>Supervisor</option><option>Supervisor Turno</option><option>Team Leader</option></select>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="f-search" placeholder="Buscar resp..." onkeyup="App.filter()">
                </div>
            </div>
            <div class="sys-info" id="clock">00:00:00</div>
        </div>
    </header>

    <main class="viewport">
        <div class="analytics-grid">
            <div class="chart-card">
                <h3>Volume por Turno <i class="fas fa-bolt"></i></h3>
                <canvas id="chartTurno"></canvas>
            </div>
            <div class="chart-card">
                <h3>Registros por Cargo <i class="fas fa-user-tie"></i></h3>
                <canvas id="chartCargo"></canvas>
            </div>
            <div class="chart-card">
                <h3>Volume por CD <i class="fas fa-warehouse"></i></h3>
                <canvas id="chartCD"></canvas>
            </div>
            <div class="chart-card">
                <h3>Performance de Áreas <i class="fas fa-chart-pie"></i></h3>
                <canvas id="chartArea"></canvas>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div style="font-weight: 800; font-size: 14px;"><i class="fas fa-circle" style="color: #3fb950; font-size: 8px;"></i> HISTÓRICO GERAL</div>
                <div class="reg-badge" id="reg-count">0 REGISTROS</div>
            </div>
            <div class="scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th>Data e Hora</th>
                            <th>Turno</th>
                            <th>CD</th>
                            <th>Responsável</th>
                            <th>Cargo</th>
                            <th>Área</th>
                        </tr>
                    </thead>
                    <tbody id="main-table"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        Chart.register(ChartDataLabels);

        const App = {
            database: [
                {data: '12/05/2026 15:37:16', turno: 'T1', cd: 'Jaboatão', resp: 'Guioberto', cargo: 'Supervisor', area: 'Checking Leve'},
                {data: '12/05/2026 16:05:44', turno: 'T1', cd: 'Franco 1', resp: 'Giovane Torre', cargo: 'Supervisor Turno', area: 'Checking Leve'},
                {data: '12/05/2026 19:28:19', turno: 'T1', cd: 'Hidrolândia', resp: 'Marleide Gomes', cargo: 'Team Leader', area: 'Checking Leve'},
                {data: '12/05/2026 20:04:03', turno: 'T2', cd: 'Nova Santa Rita', resp: 'Daniele Geringer', cargo: 'Supervisor', area: 'Picking Leve'},
                {data: '12/05/2026 20:22:50', turno: 'T2', cd: 'Hidrolândia', resp: 'Tamiles Oliveira', cargo: 'Team Leader', area: 'Inbound'},
                {data: '12/05/2026 20:34:06', turno: 'T2', cd: 'Nova Santa Rita', resp: 'Leonardo Oliveira Fernandes', cargo: 'Supervisor', area: 'Inbound'},
                {data: '12/05/2026 23:15:25', turno: 'T2', cd: 'Jaboatão', resp: 'Pedro Aurélio', cargo: 'Supervisor', area: 'Inventário'},
                {data: '12/05/2026 23:42:44', turno: 'T2', cd: 'Jaboatão', resp: 'Guilherme Cruz', cargo: 'Supervisor', area: 'Qualidade'},
                {data: '13/05/2026 06:51:21', turno: 'T1', cd: 'Franco 1', resp: 'Cezar Terenzi', cargo: 'Supervisor', area: 'Shipping'},            
                {data: '13/05/2026 07:46:18', turno: 'T3', cd: 'Franco 1', resp: 'Maicon Luiz', cargo: 'Supervisor Turno', area: 'Picking Leve'},
                {data: '13/05/2026 07:50:06', turno: 'T3', cd: 'Franco 1', resp: 'Joyce Barros', cargo: 'Supervisor Turno', area: 'Picking Leve'}
            ],
            filtered: [],
            charts: {},

            init() {
                this.renderCharts();
                this.filter();
                setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
            },

            filter() {
                const t = document.getElementById('f-turno').value;
                const c = document.getElementById('f-cd').value;
                const g = document.getElementById('f-cargo').value;
                const s = document.getElementById('f-search').value.toLowerCase();

                this.filtered = this.database.filter(i => 
                    (t === "" || i.turno === t) && (c === "" || i.cd === c) && 
                    (g === "" || i.cargo === g) && (i.resp.toLowerCase().includes(s) || i.area.toLowerCase().includes(s))
                );

                this.renderTable();
                this.updateCharts();
            },

            renderTable() {
                document.getElementById('reg-count').innerText = `${this.filtered.length} REGISTROS`;
                document.getElementById('main-table').innerHTML = this.filtered.map(r => `
                    <tr>
                        <td class="time-txt">${r.data}</td>
                        <td><b>${r.turno}</b></td>
                        <td><b>${r.cd}</b></td>
                        <td>${r.resp}</td>
                        <td style="color: var(--text-dim)">${r.cargo}</td>
                        <td><span class="badge-area">${r.area}</span></td>
                    </tr>
                `).join('');
            },

            renderCharts() {
                const opt = (color) => ({
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        datalabels: { color: '#fff', anchor: 'end', align: 'top', font: { weight: 'bold', family: 'JetBrains Mono' } }
                    },
                    scales: {
                        y: { grid: { color: '#161b22' }, ticks: { display: false }, border: { display: false } },
                        x: { grid: { display: false }, ticks: { color: '#8b949e', font: { size: 9 } } }
                    }
                });

                this.charts.turno = new Chart(document.getElementById('chartTurno'), {
                    type: 'bar', data: { labels: [], datasets: [{ backgroundColor: '#ee4d2d', borderRadius: 5, data: [] }] },
                    options: opt('#ee4d2d')
                });

                this.charts.cargo = new Chart(document.getElementById('chartCargo'), {
                    type: 'bar', data: { labels: [], datasets: [{ backgroundColor: '#f1e05a', borderRadius: 5, data: [] }] },
                    options: opt('#f1e05a')
                });

                this.charts.cd = new Chart(document.getElementById('chartCD'), {
                    type: 'bar', data: { labels: [], datasets: [{ backgroundColor: '#2f81f7', borderRadius: 5, data: [] }] },
                    options: opt('#2f81f7')
                });

                this.charts.area = new Chart(document.getElementById('chartArea'), {
                    type: 'doughnut', data: { labels: [], datasets: [{ backgroundColor: ['#ee4d2d', '#2f81f7', '#3fb950', '#f1e05a', '#8b949e', '#a371f7'], data: [] }] },
                    options: {
                        responsive: true, maintainAspectRatio: false, cutout: '65%',
                        plugins: { legend: { display: false }, datalabels: { color: '#fff', font: { weight: 'bold', size: 10 } } }
                    }
                });
            },

            updateCharts() {
                const group = (key) => {
                    const map = {};
                    this.filtered.forEach(i => map[i[key]] = (map[i[key]] || 0) + 1);
                    return { labels: Object.keys(map), values: Object.values(map) };
                };

                const sync = (chart, key) => {
                    const d = group(key);
                    chart.data.labels = d.labels;
                    chart.data.datasets[0].data = d.values;
                    chart.update();
                };

                sync(this.charts.turno, 'turno');
                sync(this.charts.cargo, 'cargo');
                sync(this.charts.cd, 'cd');
                sync(this.charts.area, 'area');
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
