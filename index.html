<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS-BR | MONITORAMENTO NACIONAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --shopee-orange: #ee4d2d;
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* --- HEADER PADRONIZADO --- */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .hud-wrapper {
            max-width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            flex-grow: 1;
            justify-content: center;
        }

        .filter-group select, .search-box input {
            background: #161b22;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        /* --- GRID DE GRÁFICOS (ENCAIXE PERFEITO) --- */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 colunas idênticas */
            gap: 15px;
            padding: 20px 30px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 300px; /* Altura fixa para alinhar todos */
        }

        .chart-card h3 {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .chart-container {
            flex-grow: 1;
            position: relative;
        }

        /* --- TABELA --- */
        .table-section { padding: 0 30px 40px 30px; }
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .table-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; 
            padding: 15px 20px; 
            color: var(--text-dim); 
            font-size: 11px; 
            text-transform: uppercase; 
            border-bottom: 1px solid var(--border);
        }
        td { padding: 14px 20px; font-size: 13px; border-bottom: 1px solid #161b22; }
        
        .badge-area {
            background: rgba(47, 129, 247, 0.1);
            color: #58a6ff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
    </style>
</head>
<body>

<header>
    <div class="hud-wrapper">
        <div style="font-weight: 800; font-size: 18px;">EOS<span style="color:var(--shopee-orange)">BR</span></div>
        <div class="filter-bar">
            <select><option>MAIO 2026</option></select>
            <select id="f-turno" onchange="App.filter()"><option value="">TURNOS</option><option>T1</option><option>T2</option><option>T3</option></select>
            <select id="f-cd" onchange="App.filter()"><option value="">CDS (TODOS)</option><option>Jaboatão</option><option>Franco 1</option></select>
            <div class="search-box"><input type="text" id="f-search" placeholder="Buscar..." onkeyup="App.filter()"></div>
        </div>
        <div style="font-family: var(--font-code); color: var(--shopee-orange)" id="clock">00:00:00</div>
    </div>
</header>

<div class="analytics-grid">
    <div class="chart-card">
        <h3>Volume / Turno <i class="fas fa-chart-bar"></i></h3>
        <div class="chart-container"><canvas id="chartTurno"></canvas></div>
    </div>
    <div class="chart-card">
        <h3>Performance / CD <i class="fas fa-warehouse"></i></h3>
        <div class="chart-container"><canvas id="chartCD"></canvas></div>
    </div>
    <div class="chart-card">
        <h3>Cargo <i class="fas fa-user-tie"></i></h3>
        <div class="chart-container"><canvas id="chartCargo"></canvas></div>
    </div>
    <div class="chart-card">
        <h3>Áreas Ativas <i class="fas fa-adjust"></i></h3>
        <div class="chart-container"><canvas id="chartArea"></canvas></div>
    </div>
</div>

<div class="table-section">
    <div class="table-container">
        <div class="table-header">
            <span style="font-weight: 700"><i class="fas fa-list"></i> HISTÓRICO DE REGISTROS</span>
            <span id="reg-count" style="color: var(--shopee-orange); font-size: 12px; font-weight: 700;"></span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Turno</th>
                    <th>CD</th>
                    <th>Responsável</th>
                    <th>Área</th>
                </tr>
            </thead>
            <tbody id="main-table"></tbody>
        </table>
    </div>
</div>

<script>
    const dataLabelsPlugin = {
        id: 'dataLabels',
        afterDatasetsDraw(chart) {
            const {ctx, data} = chart;
            ctx.save();
            data.datasets.forEach((dataset, i) => {
                chart.getDatasetMeta(i).data.forEach((datapoint, index) => {
                    const val = data.datasets[i].data[index];
                    ctx.fillStyle = '#8b949e';
                    ctx.font = 'bold 10px JetBrains Mono';
                    ctx.textAlign = 'center';
                    ctx.fillText(val, datapoint.x, datapoint.y - 10);
                });
            });
        }
    };

    const App = {
        database: [
            {data: '12/05 15:37', turno: 'T1', cd: 'Jaboatão', resp: 'Guioberto', area: 'Checking Leve'},
            {data: '12/05 16:05', turno: 'T1', cd: 'Franco 1', resp: 'Giovane Torre', area: 'Inbound'},
            {data: '12/05 19:28', turno: 'T2', cd: 'Hidrolândia', resp: 'Marleide Gomes', area: 'Picking'},
            {data: '13/05 07:46', turno: 'T3', cd: 'Franco 1', resp: 'Maicon Luiz', area: 'Shipping'}
        ],
        charts: {},

        init() {
            this.renderCharts();
            this.filter();
            setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
        },

        filter() {
            const t = document.getElementById('f-turno').value;
            const cd = document.getElementById('f-cd').value;
            const s = document.getElementById('f-search').value.toLowerCase();

            const filtered = this.database.filter(i => 
                (t === "" || i.turno === t) && 
                (cd === "" || i.cd === cd) &&
                (i.resp.toLowerCase().includes(s) || i.area.toLowerCase().includes(s))
            );

            this.renderTable(filtered);
            this.updateCharts(filtered);
        },

        renderTable(data) {
            document.getElementById('reg-count').innerText = `${data.length} ENCONTRADOS`;
            document.getElementById('main-table').innerHTML = data.map(r => `
                <tr>
                    <td style="color:var(--shopee-orange)">${r.data}</td>
                    <td><b>${r.turno}</b></td>
                    <td>${r.cd}</td>
                    <td>${r.resp}</td>
                    <td><span class="badge-area">${r.area}</span></td>
                </tr>
            `).join('');
        },

        renderCharts() {
            const opt = { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { 
                    y: { display: false }, 
                    x: { grid: { display: false }, ticks: { color: '#8b949e', font: { size: 9 } } } 
                }
            };

            this.charts.turno = new Chart(document.getElementById('chartTurno'), { type: 'bar', data: { labels: [], datasets: [{ backgroundColor: '#ee4d2d', data: [] }] }, options: opt, plugins: [dataLabelsPlugin] });
            this.charts.cd = new Chart(document.getElementById('chartCD'), { type: 'bar', data: { labels: [], datasets: [{ backgroundColor: '#2f81f7', data: [] }] }, options: opt, plugins: [dataLabelsPlugin] });
            this.charts.cargo = new Chart(document.getElementById('chartCargo'), { type: 'bar', data: { labels: [], datasets: [{ backgroundColor: '#8957e5', data: [] }] }, options: opt, plugins: [dataLabelsPlugin] });
            this.charts.area = new Chart(document.getElementById('chartArea'), { type: 'doughnut', data: { labels: [], datasets: [{ data: [], backgroundColor: ['#ee4d2d', '#2f81f7', '#3fb950', '#8957e5'] }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { display: false } } } });
        },

        updateCharts(data) {
            const group = (key) => {
                const r = {};
                data.forEach(d => r[d[key]] = (r[d[key]] || 0) + 1);
                return { l: Object.keys(r), v: Object.values(r) };
            };

            const u = (c, k) => { const d = group(k); c.data.labels = d.l; c.data.datasets[0].data = d.v; c.update(); };
            u(this.charts.turno, 'turno');
            u(this.charts.cd, 'cd');
            u(this.charts.cargo, 'turno'); // Simulação para o cargo
            u(this.charts.area, 'area');
        }
    };

    window.onload = () => App.init();
</script>
</body>
</html>
