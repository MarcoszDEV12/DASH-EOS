<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS-BR | Shopee Future Ops</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- 1. CONFIGURAÇÕES GLOBAIS & TEMAS --- */
        :root {
            --shopee-orange: #ee4d2d;
            --shopee-dark-orange: #d73211;
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --bg-hover: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-blue: #2f81f7;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- 2. HEADER HUD (FILTROS) --- */
        header {
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 15px 40px;
            z-index: 1000;
        }

        .hud-wrapper {
            max-width: 1800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 200px 1fr 250px;
            gap: 40px;
            align-items: center;
        }

        .logo-section h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-section span { color: var(--shopee-orange); }

        .filter-controls {
            display: grid;
            grid-template-columns: repeat(4, 140px) 1fr;
            gap: 12px;
        }

        .control-group select, .search-box input {
            width: 100%;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .control-group select:hover { border-color: var(--shopee-orange); }

        .search-box { position: relative; }
        .search-box input { padding-left: 40px; }
        .search-box i { position: absolute; left: 15px; top: 12px; color: var(--text-dim); }

        .sys-status {
            text-align: right;
            font-family: var(--font-code);
            font-size: 14px;
            color: var(--shopee-orange);
            font-weight: 700;
        }

        /* --- 3. DASHBOARD VIEWPORT --- */
        .main-viewport {
            flex: 1;
            padding: 25px 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(238, 77, 45, 0.05), transparent);
        }

        .content-max { max-width: 1800px; margin: 0 auto; }

        /* GRÁFICOS */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            height: 320px;
            position: relative;
            transition: var(--transition);
        }

        .chart-card:hover { border-color: rgba(238, 77, 45, 0.3); }

        .chart-card h3 {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chart-container { height: 240px; width: 100%; }

        /* --- 4. DATA TABLE (REAL-TIME) --- */
        .data-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .table-toolbar {
            padding: 20px 30px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .counter-pill {
            background: rgba(238, 77, 45, 0.1);
            color: var(--shopee-orange);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
        }

        .table-wrapper { 
            max-height: 600px; 
            overflow-y: auto; 
            border-radius: 0 0 24px 24px;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        
        thead th {
            position: sticky;
            top: 0;
            background: #0d1117;
            padding: 18px 25px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 16px 25px;
            font-size: 13px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
            transition: var(--transition);
        }

        tbody tr:hover td { background: rgba(238, 77, 45, 0.02); color: #fff; }

        /* --- 5. COMPONENTES DE CÉLULA --- */
        .time-cell { font-family: var(--font-code); color: var(--shopee-orange); font-weight: 600; }
        
        .cd-cell { 
            font-weight: 800; 
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        
        .cd-cell::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-blue);
        }

        .area-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .tag-inbound { background: rgba(47, 129, 247, 0.1); color: var(--accent-blue); }
        .tag-picking { background: rgba(238, 77, 45, 0.1); color: var(--shopee-orange); }
        .tag-shipping { background: rgba(59, 185, 80, 0.1); color: var(--accent-green); }

        .idle-indicator {
            font-family: var(--font-code);
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
        }

        .idle-none { background: rgba(59, 185, 80, 0.1); color: var(--accent-green); }
        .idle-high { background: rgba(248, 81, 73, 0.1); color: var(--accent-red); border: 1px solid rgba(248, 81, 73, 0.2); }

        /* --- 6. ANIMAÇÕES --- */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .live-dot { color: var(--accent-green); animation: pulse 2s infinite; margin-right: 5px; }

    </style>
</head>
<body>

    <!-- CABEÇALHO COM FILTROS (HUD) -->
    <header>
        <div class="hud-wrapper">
            <div class="logo-section">
                <h1>EOS<span>BR</span> HUD</h1>
            </div>

            <div class="filter-controls">
                <div class="control-group">
                    <select id="filter-mes">
                        <option value="MAIO">MAIO 2026</option>
                        <option value="ABRIL">ABRIL 2026</option>
                    </select>
                </div>
                <div class="control-group">
                    <select id="filter-turno" onchange="Dashboard.filterData()">
                        <option value="">TURNOS (TODOS)</option>
                        <option value="T1">TURNO 1</option>
                        <option value="T2">TURNO 2</option>
                        <option value="T3">TURNO 3</option>
                        <option value="T4">TURNO 4</option>
                        <option value="T5">TURNO 5</option>
                    </select>
                </div>
                <div class="control-group">
                    <select id="filter-cd" onchange="Dashboard.filterData()">
                        <option value="">TODOS CDs</option>
                        <option value="Jaboatão">JABOATÃO</option>
                        <option value="Franco 1">FRANCO 1</option>
                        <option value="Franco 2">FRANCO 2</option>
                        <option value="Hidrolândia">HIDROLÂNDIA</option>
                        <option value="Contagem">CONTAGEM</option>
                    </select>
                </div>
                <div class="control-group">
                    <select id="filter-area" onchange="Dashboard.filterData()">
                        <option value="">TODAS ÁREAS</option>
                        <option value="Inbound">INBOUND</option>
                        <option value="Picking">PICKING</option>
                        <option value="Shipping">SHIPPING</option>
                        <option value="Qualidade">QUALIDADE</option>
                    </select>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-resp" placeholder="Pesquisar responsável ou cargo..." onkeyup="Dashboard.filterData()">
                </div>
            </div>

            <div class="sys-status">
                <span id="live-clock">00:00:00</span>
            </div>
        </div>
    </header>

    <!-- ÁREA PRINCIPAL -->
    <main class="main-viewport">
        <div class="content-max">
            
            <!-- KPIs E GRÁFICOS -->
            <div class="kpi-grid">
                <div class="chart-card">
                    <h3>Bipes por Turno <i class="fas fa-bolt"></i></h3>
                    <div class="chart-container"><canvas id="chart-turno"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>Performance por Unidade <i class="fas fa-warehouse"></i></h3>
                    <div class="chart-container"><canvas id="chart-cd"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>Distribuição Operacional <i class="fas fa-chart-pie"></i></h3>
                    <div class="chart-container"><canvas id="chart-area"></canvas></div>
                </div>
            </div>

            <!-- TABELA DE REGISTROS -->
            <div class="data-section">
                <div class="table-toolbar">
                    <div style="font-weight: 800; font-size: 15px; letter-spacing: 1px;">
                        <i class="fas fa-circle live-dot"></i> MONITORAMENTO NACIONAL EOS
                    </div>
                    <div class="counter-pill" id="total-count">0 REGISTROS CARREGADOS</div>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Data e Hora</th>
                                <th>Turno</th>
                                <th>CD</th>
                                <th>Responsável</th>
                                <th>Cargo</th>
                                <th>Área</th>
                                <th>Idle Time</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Gerado via JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPT DE INTELIGÊNCIA DO DASHBOARD -->
    <script>
        /** 
         * DASHBOARD CORE ENGINE v6.0
         * Manipulação de bipes em massa (> 600 linhas)
         */
        
        const Dashboard = {
            // Base de dados simulada para preencher as 600+ linhas solicitadas
            rawData: [],
            filteredData: [],
            charts: {},

            init() {
                this.generateMassiveData();
                this.updateClock();
                this.renderCharts();
                this.filterData();
                
                setInterval(() => this.updateClock(), 1000);
            },

            // Gerador de dados para stress-test (600+ linhas)
            generateMassiveData() {
                const cds = ['Jaboatão', 'Franco 1', 'Franco 2', 'Hidrolândia', 'Contagem', 'Nova Santa Rita'];
                const cargos = ['Team Leader', 'Supervisor', 'Coordenador', 'PS', 'Supervisor Turno'];
                const areas = ['Inbound', 'Checking Leve', 'Picking Vol', 'Shipping', 'IBT', 'Qualidade'];
                const turnos = ['T1', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];

                for (let i = 0; i < 690; i++) {
                    this.rawData.push({
                        data: `13/05/26 12:${(i % 60).toString().padStart(2, '0')}`,
                        turno: turnos[Math.floor(Math.random() * turnos.length)],
                        cd: cds[Math.floor(Math.random() * cds.length)],
                        resp: `Colaborador EOS ${1000 + i}`,
                        cargo: cargos[Math.floor(Math.random() * cargos.length)],
                        area: areas[Math.floor(Math.random() * areas.length)],
                        idle: Math.floor(Math.random() * 45)
                    });
                }
            },

            filterData() {
                const fTurno = document.getElementById('filter-turno').value;
                const fCD = document.getElementById('filter-cd').value;
                const fArea = document.getElementById('filter-area').value;
                const fSearch = document.getElementById('search-resp').value.toLowerCase();

                this.filteredData = this.rawData.filter(item => {
                    return (fTurno === "" || item.turno === fTurno) &&
                           (fCD === "" || item.cd === fCD) &&
                           (fArea === "" || item.area.includes(fArea)) &&
                           (item.resp.toLowerCase().includes(fSearch) || item.cargo.toLowerCase().includes(fSearch));
                });

                this.renderTable();
                this.updateChartsData();
            },

            renderTable() {
                const tbody = document.getElementById('table-body');
                document.getElementById('total-count').innerText = `${this.filteredData.length} REGISTROS CARREGADOS`;
                
                tbody.innerHTML = this.filteredData.map(row => `
                    <tr>
                        <td class="time-cell">${row.data}</td>
                        <td><b>${row.turno}</b></td>
                        <td><div class="cd-cell">${row.cd}</div></td>
                        <td><b>${row.resp}</b></td>
                        <td style="color: var(--text-dim)">${row.cargo}</td>
                        <td><span class="area-tag ${this.getTagClass(row.area)}">${row.area}</span></td>
                        <td>
                            <span class="idle-indicator ${row.idle > 20 ? 'idle-high' : 'idle-none'}">
                                ${row.idle} MIN
                            </span>
                        </td>
                    </tr>
                `).join('');
            },

            getTagClass(area) {
                if (area.includes('Inbound')) return 'tag-inbound';
                if (area.includes('Picking')) return 'tag-picking';
                if (area.includes('Shipping')) return 'tag-shipping';
                return '';
            },

            renderCharts() {
                const chartDefaults = {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#161b22' }, ticks: { color: '#8b949e', font: { family: 'JetBrains Mono' } } },
                        x: { grid: { display: false }, ticks: { color: '#8b949e', font: { family: 'JetBrains Mono' } } }
                    }
                };

                // Gráfico de Turnos
                this.charts.turno = new Chart(document.getElementById('chart-turno'), {
                    type: 'bar',
                    data: { labels: [], datasets: [{ backgroundColor: '#ee4d2d', borderRadius: 6, data: [] }] },
                    options: chartDefaults
                });

                // Gráfico de CDs
                this.charts.cd = new Chart(document.getElementById('chart-cd'), {
                    type: 'bar',
                    data: { labels: [], datasets: [{ backgroundColor: '#2f81f7', borderRadius: 6, data: [] }] },
                    options: chartDefaults
                });

                // Gráfico de Áreas
                this.charts.area = new Chart(document.getElementById('chart-area'), {
                    type: 'doughnut',
                    data: { labels: [], datasets: [{ backgroundColor: ['#ee4d2d', '#2f81f7', '#3fb950', '#f1e05a', '#8b949e'], data: [] }] },
                    options: { ...chartDefaults, cutout: '75%' }
                });
            },

            updateChartsData() {
                // Cálculo de Turnos
                const turnoCounts = {};
                this.filteredData.forEach(d => turnoCounts[d.turno] = (turnoCounts[d.turno] || 0) + 1);
                this.charts.turno.data.labels = Object.keys(turnoCounts);
                this.charts.turno.data.datasets[0].data = Object.values(turnoCounts);
                this.charts.turno.update();

                // Cálculo de CDs
                const cdCounts = {};
                this.filteredData.forEach(d => cdCounts[d.cd] = (cdCounts[d.cd] || 0) + 1);
                this.charts.cd.data.labels = Object.keys(cdCounts);
                this.charts.cd.data.datasets[0].data = Object.values(cdCounts);
                this.charts.cd.update();

                // Cálculo de Áreas
                const areaCounts = {};
                this.filteredData.forEach(d => {
                    const baseArea = d.area.split(' ')[0];
                    areaCounts[baseArea] = (areaCounts[baseArea] || 0) + 1;
                });
                this.charts.area.data.labels = Object.keys(areaCounts);
                this.charts.area.data.datasets[0].data = Object.values(areaCounts);
                this.charts.area.update();
            },

            updateClock() {
                const now = new Date();
                document.getElementById('live-clock').innerText = now.toLocaleTimeString();
            }
        };

        // Inicializar Dashboard ao carregar
        window.onload = () => Dashboard.init();
    </script>
</body>
</html>
