<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS-BR | MONITORAMENTO NACIONAL</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --shopee-orange: #ee4d2d;
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --bg-hover: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-blue: #2f81f7;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
        }

        .hud-wrapper {
            display: grid; grid-template-columns: 150px 1fr 120px;
            gap: 20px; align-items: center;
        }

        .logo h1 { font-size: 18px; font-weight: 800; }
        .logo span { color: var(--shopee-orange); }

        .filter-bar {
            display: grid; grid-template-columns: repeat(4, 140px) 1fr; gap: 10px;
        }

        select, input {
            background: var(--bg-hover); border: 1px solid var(--border);
            color: var(--text-main); padding: 8px 12px; border-radius: 8px;
            font-size: 12px; width: 100%;
        }

        .viewport { flex: 1; padding: 20px; overflow-y: auto; }

        .analytics-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; margin-bottom: 20px;
        }

        .chart-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 15px; height: 280px;
        }

        .chart-card h3 { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }

        .table-container {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden;
        }

        .table-toolbar { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }

        .scroll-area { max-height: 500px; overflow-y: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #0d1117; padding: 12px; color: var(--text-dim); text-align: left; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        
        .badge { padding: 3px 8px; border-radius: 4px; font-weight: 700; font-size: 10px; }
        .bg-area { background: rgba(47, 129, 247, 0.1); color: var(--accent-blue); }
        
        #clock { color: var(--shopee-orange); font-family: var(--font-code); font-weight: 700; text-align: right; }
    </style>
</head>
<body>

    <header>
        <div class="hud-wrapper">
            <div class="logo"><h1>EOS<span>BR</span></h1></div>
            <div class="filter-bar">
                <select id="f-turno" onchange="App.filter()">
                    <option value="">TURNOS (TODOS)</option>
                    <option value="T1">T1</option><option value="T2">T2</option><option value="T3">T3</option>
                </select>
                <select id="f-cd" onchange="App.filter()">
                    <option value="">CDs (TODOS)</option>
                    <option value="Jaboatão">JABOATÃO</option>
                    <option value="Franco 1">FRANCO 1</option>
                    <option value="Hidrolândia">HIDROLÂNDIA</option>
                    <option value="Nova Santa Rita">NOVA SANTA RITA</option>
                </select>
                <select id="f-cargo" onchange="App.filter()">
                    <option value="">CARGOS (TODOS)</option>
                    <option value="Supervisor">SUPERVISOR</option>
                    <option value="Team Leader">TEAM LEADER</option>
                </select>
                <select id="f-area" onchange="App.filter()">
                    <option value="">ÁREAS (TODAS)</option>
                    <option value="Checking Leve">CHECKING LEVE</option>
                    <option value="Inbound">INBOUND</option>
                    <option value="Picking Leve">PICKING LEVE</option>
                </select>
                <input type="text" id="f-search" placeholder="Buscar por responsável..." onkeyup="App.filter()">
            </div>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <main class="viewport">
        <div class="analytics-grid">
            <div class="chart-card"><h3>Registros por Turno</h3><canvas id="chartTurno"></canvas></div>
            <div class="chart-card"><h3>Registros por CD</h3><canvas id="chartCD"></canvas></div>
            <div class="chart-card"><h3>Mix de Áreas</h3><canvas id="chartArea"></canvas></div>
        </div>

        <div class="table-container">
            <div class="table-toolbar">
                <div style="font-weight: 800;">BASE DE DADOS REAL - EOS</div>
                <div id="reg-count" style="color: var(--shopee-orange);">0 REGISTROS</div>
            </div>
            <div class="scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th>Data e Hora</th>
                            <th>Turno</th>
                            <th>CD</th>
                            <th>Responsável</th>
                            <th>Cargo</th>
                            <th>Área</th>
                        </tr>
                    </thead>
                    <tbody id="main-table"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const App = {
            database: [
                {data: '12/05/2026 15:37:16', turno: 'T1', cd: 'Jaboatão', resp: 'Guioberto', cargo: 'Supervisor', area: 'Checking Leve'},
                {data: '12/05/2026 16:05:44', turno: 'T1', cd: 'Franco 1', resp: 'Giovane Torre', cargo: 'Supervisor Turno', area: 'Checking Leve'},
                {data: '12/05/2026 19:28:19', turno: 'T1', cd: 'Hidrolândia', resp: 'Marleide Gomes', cargo: 'Team Leader', area: 'Checking Leve'},
                {data: '12/05/2026 20:04:03', turno: 'T2', cd: 'Nova Santa Rita', resp: 'Daniele Geringer', cargo: 'Supervisor', area: 'Picking Leve'},
                {data: '12/05/2026 20:22:50', turno: 'T2', cd: 'Hidrolândia', resp: 'Tamiles Oliveira', cargo: 'Team Leader', area: 'Inbound'},
                {data: '12/05/2026 20:34:06', turno: 'T2', cd: 'Nova Santa Rita', resp: 'Leonardo Oliveira', cargo: 'Supervisor', area: 'Inbound'},
                {data: '12/05/2026 23:15:25', turno: 'T2', cd: 'Jaboatão', resp: 'Pedro Aurélio', cargo: 'Supervisor', area: 'Inventário'},
                {data: '12/05/2026 23:42:44', turno: 'T2', cd: 'Jaboatão', resp: 'Guilherme Cruz', cargo: 'Supervisor', area: 'Qualidade'},
                {data: '13/05/2026 06:51:21', turno: 'T1', cd: 'Franco 1', resp: 'Cezar Terenzi', cargo: 'Supervisor', area: 'Shipping'},
                {data: '13/05/2026 07:46:18', turno: 'T3', cd: 'Franco 1', resp: 'Maicon Luiz', cargo: 'Supervisor Turno', area: 'Picking Leve'},
                {data: '13/05/2026 07:50:06', turno: 'T3', cd: 'Franco 1', resp: 'Joyce Barros', cargo: 'Supervisor Turno', area: 'Picking Leve'}
            ],
            filtered: [],
            charts: {},

            init() {
                this.updateClock();
                this.renderCharts();
                this.filter();
                setInterval(() => this.updateClock(), 1000);
            },

            updateClock() {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            },

            filter() {
                const turno = document.getElementById('f-turno').value;
                const cd = document.getElementById('f-cd').value;
                const cargo = document.getElementById('f-cargo').value;
                const area = document.getElementById('f-area').value;
                const search = document.getElementById('f-search').value.toLowerCase();

                this.filtered = this.database.filter(item => {
                    return (turno === "" || item.turno === turno) &&
                           (cd === "" || item.cd === cd) &&
                           (cargo === "" || item.cargo === cargo) &&
                           (area === "" || item.area === area) &&
                           (item.resp.toLowerCase().includes(search));
                });

                this.renderTable();
                this.updateChartsData();
            },

            renderTable() {
                const tbody = document.getElementById('main-table');
                document.getElementById('reg-count').innerText = `${this.filtered.length} REGISTROS`;
                tbody.innerHTML = this.filtered.map(row => `
                    <tr>
                        <td style="color:var(--shopee-orange)">${row.data}</td>
                        <td><b>${row.turno}</b></td>
                        <td><b>${row.cd}</b></td>
                        <td>${row.resp}</td>
                        <td style="color:var(--text-dim)">${row.cargo}</td>
                        <td><span class="badge bg-area">${row.area}</span></td>
                    </tr>
                `).join('');
            },

            renderCharts() {
                const cfg = () => ({
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: '#30363d' } }, x: { grid: { display: false } } }
                });

                this.charts.turno = new Chart(document.getElementById('chartTurno'), {
                    type: 'bar', data: { labels: [], datasets: [{ backgroundColor: '#ee4d2d', data: [] }] }, options: cfg()
                });
                this.charts.cd = new Chart(document.getElementById('chartCD'), {
                    type: 'bar', data: { labels: [], datasets: [{ backgroundColor: '#2f81f7', data: [] }] }, options: cfg()
                });
                this.charts.area = new Chart(document.getElementById('chartArea'), {
                    type: 'doughnut', data: { labels: [], datasets: [{ backgroundColor: ['#ee4d2d', '#2f81f7', '#3fb950', '#f1e05a'], data: [] }] },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
                });
            },

            updateChartsData() {
                const count = (key) => {
                    const res = {};
                    this.filtered.forEach(d => res[d[key]] = (res[d[key]] || 0) + 1);
                    return { labels: Object.keys(res), values: Object.values(res) };
                };

                const t = count('turno');
                this.charts.turno.data.labels = t.labels;
                this.charts.turno.data.datasets[0].data = t.values;
                this.charts.turno.update();

                const c = count('cd');
                this.charts.cd.data.labels = c.labels;
                this.charts.cd.data.datasets[0].data = c.values;
                this.charts.cd.update();

                const a = count('area');
                this.charts.area.data.labels = a.labels;
                this.charts.area.data.datasets[0].data = a.values;
                this.charts.area.update();
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
