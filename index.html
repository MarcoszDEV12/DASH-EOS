<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee EOS BR | Full Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --shopee-orange: #EE4D2D;
            --bg-deep: #05070A;
            --bg-card: #0D1117;
            --border: #30363D;
            --text-main: #F0F6FC;
            --text-dim: #8B949E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }

        /* Top Bar Integrada */
        .top-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 24px; font-weight: 800; }
        .logo span { color: var(--shopee-orange); }

        .header-search { 
            display: flex; 
            align-items: center; 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 10px 18px; 
            width: 350px; 
        }
        .header-search input { background: transparent; border: none; color: white; margin-left: 12px; width: 100%; outline: none; }

        /* Filtros */
        .filter-bar { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        select { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            color: var(--text-main); 
            padding: 14px; 
            border-radius: 10px; 
            cursor: pointer; 
        }

        /* KPIs */
        .kpi-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .kpi-card { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 25px; 
            transition: 0.3s;
        }
        .kpi-card:hover { border-color: var(--shopee-orange); }
        .kpi-card .label { color: var(--text-dim); font-size: 13px; margin-bottom: 10px; display: block; }
        .kpi-card .value { font-size: 28px; font-weight: 800; color: var(--shopee-orange); }

        /* Gráficos */
        .charts-section { 
            display: grid; 
            grid-template-columns: 1.5fr 1fr; 
            gap: 25px; 
            margin-bottom: 30px; 
        }
        .chart-box { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 25px; 
            height: 400px; 
        }
        .chart-box h3 { font-size: 15px; margin-bottom: 20px; color: var(--text-dim); }

        /* Tabela */
        .table-container { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 25px; 
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-dim); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }
        .badge { background: rgba(238, 77, 45, 0.1); color: var(--shopee-orange); padding: 5px 12px; border-radius: 6px; font-weight: 600; font-size: 12px; }

        @media (max-width: 1024px) {
            .charts-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="logo">SHOPEE <span>EOS</span></div>
        <div style="text-align: center;">
            <h1 style="font-size: 22px;">Visão Operacional</h1>
            <p style="color: var(--text-dim); font-size: 12px;">quarta-feira, 13 de maio de 2026</p>
        </div>
        <div class="header-search">
            <i class="fa-solid fa-search" style="color: var(--text-dim);"></i>
            <input type="text" id="search" placeholder="Pesquisar..." onkeyup="Dashboard.update()">
        </div>
    </div>

    <div class="filter-bar">
        <div class="filter-group">
            <label>Centro de Distribuição</label>
            <select id="f-cd" onchange="Dashboard.update()"><option value="">Todos</option></select>
        </div>
        <div class="filter-group">
            <label>Turno</label>
            <select id="f-turno" onchange="Dashboard.update()"><option value="">Todos</option></select>
        </div>
        <div class="filter-group">
            <label>Cargo</label>
            <select id="f-cargo" onchange="Dashboard.update()"><option value="">Todos</option></select>
        </div>
        <div class="filter-group">
            <label>Área</label>
            <select id="f-area" onchange="Dashboard.update()"><option value="">Todas</option></select>
        </div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><span class="label">Total de Registros</span><span class="value" id="k-total">0</span></div>
        <div class="kpi-card"><span class="label">CD em Destaque</span><span class="value" id="k-cd">-</span></div>
        <div class="kpi-card"><span class="label">Turno de Pico</span><span class="value" id="k-turno">-</span></div>
        <div class="kpi-card"><span class="label">Área Principal</span><span class="value" id="k-area">-</span></div>
    </div>

    <div class="charts-section">
        <div class="chart-box"><h3>Produtividade por Unidade</h3><canvas id="mainChart"></canvas></div>
        <div class="chart-box"><h3>Distribuição de Áreas</h3><canvas id="pieChart"></canvas></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Horário</th>
                    <th>Unidade (CD)</th>
                    <th>Turno</th>
                    <th>Responsável</th>
                    <th>Cargo</th>
                    <th>Área Atuante</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const Dashboard = {
            data: [
                {ts: "13/05/2026 14:20", cd: "Jaboatão", turno: "T1", resp: "MARCOS PAULO", cargo: "SUPERVISOR", area: "CHECKING LEVE"},
                {ts: "13/05/2026 13:45", cd: "Franco 2", turno: "T2", resp: "ALEX LOPES", cargo: "TEAM LEADER", area: "INBOUND"},
                {ts: "13/05/2026 12:10", cd: "Franco 2", turno: "T2", resp: "ANA CLARA", cargo: "COORDENADOR", area: "PICKING LEVE"},
                {ts: "13/05/2026 11:30", cd: "Contagem", turno: "T4", resp: "BRUNO SILVA", cargo: "PS", area: "SHIPPING"},
                {ts: "13/05/2026 10:15", cd: "Nova Santa Rita", turno: "T5", resp: "CARLA DIAS", cargo: "SUPERVISOR TURNO", area: "INVENTÁRIO"},
                {ts: "13/05/2026 09:00", cd: "Hidrolândia", turno: "T6", resp: "FELIPE MELO", cargo: "SUPERVISOR MWH", area: "QUALIDADE"},
                {ts: "13/05/2026 08:20", cd: "Jaboatão", turno: "T1", resp: "ELIAS COSTA", cargo: "SUPERVISOR", area: "IBT"},
                {ts: "12/05/2026 23:50", cd: "Franco 1", turno: "T1", resp: "GIOVANE TORRE", cargo: "SUPERVISOR TURNO", area: "CHECKING VOL"},
                {ts: "12/05/2026 22:15", cd: "Franco 2", turno: "T2", resp: "MAICON LUIZ", cargo: "TEAM LEADER", area: "PICKING VOL"}
            ],
            
            lists: {
                cds: ["Jaboatão", "Franco 1", "Franco 2", "Contagem", "Nova Santa Rita", "Hidrolândia"],
                cargos: ["TEAM LEADER", "COORDENADOR", "PS", "SUPERVISOR", "SUPERVISOR TURNO", "SUPERVISOR MWH"],
                turnos: ["T1", "T2", "T3", "T4", "T5", "T6", "T7"],
                areas: ["INBOUND", "PICKING LEVE", "PICKING VOL", "CHECKING LEVE", "CHECKING VOL", "SHIPPING", "INVENTÁRIO", "IBT", "QUALIDADE"]
            },

            charts: {},

            init() {
                this.setupFilters();
                this.initCharts();
                this.update();
            },

            setupFilters() {
                const fill = (id, list) => {
                    const el = document.getElementById(id);
                    list.forEach(item => el.innerHTML += `<option value="${item}">${item}</option>`);
                };
                fill('f-cd', this.lists.cds);
                fill('f-cargo', this.lists.cargos);
                fill('f-turno', this.lists.turnos);
                fill('f-area', this.lists.areas);
            },

            update() {
                const search = document.getElementById('search').value.toLowerCase();
                const fCd = document.getElementById('f-cd').value;
                const fCargo = document.getElementById('f-cargo').value;
                const fTurno = document.getElementById('f-turno').value;
                const fArea = document.getElementById('f-area').value;

                const filtered = this.data.filter(i => {
                    return (!fCd || i.cd === fCd) &&
                           (!fCargo || i.cargo === fCargo) &&
                           (!fTurno || i.turno === fTurno) &&
                           (!fArea || i.area === fArea) &&
                           (i.resp.toLowerCase().includes(search) || i.cargo.toLowerCase().includes(search));
                });

                this.render(filtered);
                this.updateKPIs(filtered);
                this.updateCharts(filtered);
            },

            updateKPIs(data) {
                document.getElementById('k-total').innerText = data.length;
                if(data.length > 0) {
                    const mode = (key) => {
                        const counts = {};
                        data.forEach(i => counts[i[key]] = (counts[i[key]] || 0) + 1);
                        return Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                    };
                    document.getElementById('k-cd').innerText = mode('cd');
                    document.getElementById('k-turno').innerText = mode('turno');
                    document.getElementById('k-area').innerText = mode('area');
                }
            },

            render(data) {
                document.getElementById('table-body').innerHTML = data.map(row => `
                    <tr>
                        <td style="color:var(--text-dim)">${row.ts}</td>
                        <td><b>${row.cd}</b></td>
                        <td>${row.turno}</td>
                        <td>${row.resp}</td>
                        <td style="color:var(--text-dim)">${row.cargo}</td>
                        <td><span class="badge">${row.area}</span></td>
                    </tr>
                `).join('');
            },

            initCharts() {
                this.charts.main = new Chart(document.getElementById('mainChart'), {
                    type: 'bar',
                    data: { labels: [], datasets: [{ backgroundColor: '#EE4D2D', data: [], borderRadius: 8 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#30363D' } }, x: { grid: { display: false } } } }
                });

                this.charts.pie = new Chart(document.getElementById('pieChart'), {
                    type: 'doughnut',
                    data: { labels: [], datasets: [{ backgroundColor: ['#EE4D2D', '#FF8A65', '#BF360C', '#FFAB91', '#D84315'], data: [], borderWidth: 0 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#8B949E', font: { size: 10 } } } } }
                });
            },

            updateCharts(data) {
                const cdCounts = {};
                data.forEach(i => cdCounts[i.cd] = (cdCounts[i.cd] || 0) + 1);
                this.charts.main.data.labels = Object.keys(cdCounts);
                this.charts.main.data.datasets[0].data = Object.values(cdCounts);
                this.charts.main.update();

                const areaCounts = {};
                data.forEach(i => areaCounts[i.area] = (areaCounts[i.area] || 0) + 1);
                this.charts.pie.data.labels = Object.keys(areaCounts);
                this.charts.pie.data.datasets[0].data = Object.values(areaCounts);
                this.charts.pie.update();
            }
        };

        window.onload = () => Dashboard.init();
    </script>
</body>
</html>
