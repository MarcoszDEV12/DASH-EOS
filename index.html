<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE ANALÍTICO EOS-BR | Shopee Operations</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

    <style>
        :root {
            --shopee-orange: #ee4d2d;
            --shopee-orange-glow: rgba(238, 77, 45, 0.15);
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --bg-input: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-blue: #2f81f7;
            --accent-green: #3fb950;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- SKELETON LOADING --- */
        .skeleton { background: linear-gradient(90deg, #0d1117 25%, #161b22 50%, #0d1117 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- HEADER --- */
        header {
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 30px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-shopee { background: var(--shopee-orange); color: white; padding: 5px 10px; border-radius: 6px; font-weight: 800; font-size: 14px; }
        .logo-title { font-weight: 700; font-size: 16px; letter-spacing: -0.5px; }

        .header-tools { display: flex; align-items: center; gap: 25px; }
        .real-time-clock { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--shopee-orange); }

        /* --- FILTERS --- */
        .filter-section {
            padding: 20px 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            background: linear-gradient(180deg, rgba(13,17,23,1) 0%, rgba(5,7,10,1) 100%);
        }

        .filter-group select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 140px;
        }

        .filter-group select:hover { border-color: var(--shopee-orange); }

        /* --- KPI GRID --- */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            padding: 0 30px 30px 30px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            border-color: var(--shopee-orange);
            box-shadow: 0 10px 30px var(--shopee-orange-glow);
        }

        .kpi-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .kpi-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(238, 77, 45, 0.1); color: var(--shopee-orange); }
        .kpi-trend { font-size: 12px; font-weight: 600; padding: 4px 8px; border-radius: 20px; }
        .trend-up { background: rgba(63, 185, 80, 0.1); color: var(--accent-green); }

        .kpi-label { font-size: 13px; color: var(--text-dim); font-weight: 500; }
        .kpi-value { font-size: 26px; font-weight: 800; margin-top: 5px; }

        /* --- CHARTS SECTION --- */
        .charts-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 0 30px 30px 30px;
        }

        .chart-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chart-box canvas {
            flex: 1;
            min-height: 0;
            width: 100% !important;
        }

        .chart-box-header { margin-bottom: 20px; font-weight: 700; font-size: 15px; color: var(--text-main); display: flex; align-items: center; gap: 10px; }

        /* --- TABLE SECTION --- */
        .table-section { padding: 0 30px 50px 30px; }
        .table-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .table-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-container { position: relative; }
        .search-container i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        .search-container input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 15px 10px 35px;
            border-radius: 10px;
            width: 300px;
        }

        .table-scroll { max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #161b22; padding: 15px 20px; font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; position: sticky; top: 0; }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover { background: rgba(238, 77, 45, 0.02); }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; background: var(--bg-input); }

        @media (max-width: 1024px) {
            .charts-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

        <canvas id="chartArea"></canvas>

</div>

<div class="table-section">

            try {
                const response = await fetch(SHEETS_URL);
                if (response.ok) {
                    const csvText = await response.text();
                    const parsed = this.parseCSV(csvText);
                    this.rawData = [...staticData, ...parsed];
                } else {
                    this.rawData = staticData;

            } catch (error) {
                console.error("Erro ao carregar dados externos, utilizando dados locais:", error);
                this.rawData = staticData;
            }
        },

        parseCSV(csv) {
            const lines = csv.split('\n');
            const result = [];
            if (lines.length === 0 || !lines[0]) return result;
            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());

            for (let i = 1; i < lines.length; i++) {
                const obj = {};
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (currentline.length < headers.length) continue;

                headers.forEach((header, index) => {
                    let val = currentline[index]?.replace(/"/g, '').trim();
                    
                    if(header === 'CD') {
                        if(val === 'JABOATAO') val = 'BRPE1';
                        else if(val === 'FRANCO 1') val = 'BRSP1';
                        else if(val === 'FRANCO 2') val = 'BRSP2';
                        else if(val === 'HIDROLÂNDIA') val = 'BRGO1';
                        else if(val === 'NOVA SANTA RITA') val = 'BRRS1';
                        else if(val === 'CONTAGEM') val = 'BRMG1';
                    }
                    obj[header] = val;
                });
                result.push(obj);
            }
            return result;
        },

        populateFilters() {
            const fill = (id, list) => {
                const select = document.getElementById(id);
                select.innerHTML = select.options[0].outerHTML; 
                
                list.forEach(val => {
                    const opt = document.createElement('option');
                    opt.value = val;
                    opt.innerText = val;
                    select.appendChild(opt);
                });
            };

            fill('filter-mes', this.filterOptions.meses);
            fill('filter-turno', this.filterOptions.turnos);
            fill('filter-cd', this.filterOptions.cds);
            fill('filter-cargo', this.filterOptions.cargos);
        },

        applyFilters() {
            const fMes = document.getElementById('filter-mes').value;
            const fTurno = document.getElementById('filter-turno').value;
            const fCD = document.getElementById('filter-cd').value;
            const fCargo = document.getElementById('filter-cargo').value;
            const fSearch = document.getElementById('tableSearch').value.toLowerCase();

            // Atualiza os títulos das caixas dos gráficos dependendo do CD selecionado
            const currentCDLabel = fCD ? `(${fCD})` : '(Geral)';
            document.getElementById('headerChartCargo').innerHTML = `<i class="fas fa-users" style="color: var(--shopee-orange)"></i> Distribuição por Cargo ${currentCDLabel}`;
            document.getElementById('headerChartArea').innerHTML = `<i class="fas fa-layer-group" style="color: var(--accent-green)"></i> Registros por Área ${currentCDLabel}`;

            this.filteredData = this.rawData.filter(item => {
                return (!fMes || item['MÊS'] === fMes) &&
                       (!fTurno || item['TURNO'] === fTurno) &&
                       (!fCD || item['CD'] === fCD) &&
                       (!fCargo || item['CARGO'] === fCargo) &&
                       (Object.values(item).some(v => String(v).toLowerCase().includes(fSearch)));
            });

            this.updateUI();
        },

        updateUI() {
            document.getElementById('kpi-total').innerText = this.filteredData.length;
            
            const findTop = (key) => {
                if (this.filteredData.length === 0) return "-";
                const counts = {};
                this.filteredData.forEach(x => { if(x[key]) counts[x[key]] = (counts[x[key]] || 0) + 1; });
                const keys = Object.keys(counts);
                if (keys.length === 0) return "-";
                return keys.reduce((a, b) => counts[a] > counts[b] ? a : b);
            };

            document.getElementById('kpi-turno').innerText = findTop('TURNO');
            document.getElementById('kpi-cd').innerText = findTop('CD');

            const body = document.getElementById('tableBody');
            body.innerHTML = this.filteredData.map(item => `
                <tr>
                    <td style="color: var(--shopee-orange); font-weight:600">${item['DATA E HORA'] || ''}</td>
                    <td>${item['MÊS'] || ''}</td>
                    <td><span class="badge">${item['TURNO'] || ''}</span></td>
                    <td><b>${item['CD'] || ''}</b></td>
                    <td>${item['NOME DO RESPONSÁVEL'] || ''}</td>
                    <td>${item['CARGO'] || ''}</td>
                    <td><span class="badge" style="border-left: 3px solid var(--accent-green)">${item['ÁREA'] || ''}</span></td>
                </tr>
            `).join('');

            this.updateChartsData();
        },

        createCharts() {
            const globalLabelConfig = {
                display: true,
                color: '#fff',
                font: { weight: 'bold', size: 11 },
                formatter: (value) => Math.floor(value)
            };

            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { top: 25, right: 25, bottom: 10, left: 10 } },
                plugins: { 
                    legend: { display: false },
                    datalabels: { ...globalLabelConfig, anchor: 'end', align: 'end', offset: 4 }
                },
                scales: {
                    y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                    x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                }
            };

            // Gráfico de Turno
            this.charts.turno = new Chart(document.getElementById('chartTurno'), {
                type: 'bar',
                data: { labels: [], datasets: [{ backgroundColor: '#ee4d2d', borderRadius: 6, data: [] }] },
                options: { 
                    ...commonOptions, 
                    indexAxis: 'y',
                    plugins: {
                        legend: { display: false },
                        datalabels: { ...globalLabelConfig, anchor: 'end', align: 'right', offset: 4 }
                    }
                }
            });

            // Gráfico de CD
            this.charts.cd = new Chart(document.getElementById('chartCD'), {
                type: 'bar',
                data: { labels: [], datasets: [{ backgroundColor: '#2f81f7', borderRadius: 6, data: [] }] },
                options: commonOptions
            });

            // Gráfico de Pizza/Rosca de Cargos
            this.charts.cargo = new Chart(document.getElementById('chartCargo'), {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#ee4d2d', '#2f81f7', '#3fb950', '#8957e5', '#f85149', '#f1c40f'], borderColor: '#0d1117', borderWidth: 2 }] },
                options: { 
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { top: 10, right: 10, bottom: 10, left: 10 } },
                    plugins: { 
                        legend: { 
                            display: true, 
                            position: 'right', 
                            labels: { color: '#8b949e', font: { size: 11, family: 'Plus Jakarta Sans' }, boxWidth: 12 } 
                        },
                        datalabels: {
                            display: true,
                            color: '#fff',
                            font: { weight: 'bold', size: 11 },
                            formatter: (value) => value > 0 ? Math.floor(value) : '',
                            anchor: 'center',
                            align: 'center'
                        }
                    }
                }
            });

            // Gráfico de Área (Customizado e Melhorado)
            const ctxArea = document.getElementById('chartArea').getContext('2d');
            const gradientArea = ctxArea.createLinearGradient(0, 0, 0, 300);
            gradientArea.addColorStop(0, 'rgba(63, 185, 80, 0.35)');
            gradientArea.addColorStop(1, 'rgba(63, 185, 80, 0.00)');

            this.charts.area = new Chart(ctxArea, {
                type: 'line',
                data: { 
                    labels: [], 
                    datasets: [{ 
                        label: 'Registros', 
                        data: [], 
                        borderColor: '#3fb950', 
                        borderWidth: 3,
                        tension: 0.35, 
                        fill: true, 
                        backgroundColor: gradientArea,
                        pointBackgroundColor: '#3fb950',
                        pointBorderColor: '#0d1117',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        pointHoverBackgroundColor: '#3fb950',
                        pointHoverBorderColor: '#fff',
                        pointHoverBorderWidth: 2
                    }] 
                },
                options: {
                    ...commonOptions,
                    scales: {
                        y: { 
                            grid: { color: 'rgba(48, 54, 61, 0.5)' }, 
                            ticks: { color: '#8b949e', stepSize: 1 } 
                        },
                        x: { 
                            grid: { display: false }, 
                            ticks: { color: '#8b949e' } 
                        }
                    }
                }
            });
        },

        updateChartsData() {
            const process = (key, forcedLabels = null) => {
                const counts = {};
                
                if (forcedLabels) {
                    forcedLabels.forEach(l => counts[l] = 0);
                }
                
                this.filteredData.forEach(x => { 
                    if(x[key]) counts[x[key]] = (counts[x[key]] || 0) + 1; 
                });

                let finalLabels = Object.keys(counts);
                let finalValues = Object.values(counts);

                if (!forcedLabels) {
                    return { labels: finalLabels, values: finalValues };
                }

                return { labels: finalLabels.filter(l => counts[l] > 0 || forcedLabels.includes(l)), values: finalValues };
            };

            const dTurno = process('TURNO', this.filterOptions.turnos);
            this.charts.turno.data.labels = dTurno.labels;
            this.charts.turno.data.datasets[0].data = dTurno.values;
            this.charts.turno.update();

            const dCD = process('CD', this.filterOptions.cds);
            this.charts.cd.data.labels = dCD.labels;
            this.charts.cd.data.datasets[0].data = dCD.values;
            this.charts.cd.update();

            const dCargo = process('CARGO', this.filterOptions.cargos);
            this.charts.cargo.data.labels = dCargo.labels;
            this.charts.cargo.data.datasets[0].data = dCargo.values;
            this.charts.cargo.update();

            const dArea = process('ÁREA');
            this.charts.area.data.labels = dArea.labels;
            this.charts.area.data.datasets[0].data = dArea.values;
            this.charts.area.update();
        }
    };

    window.onload = () => Dashboard.init();
</script>

</body>
</html>
